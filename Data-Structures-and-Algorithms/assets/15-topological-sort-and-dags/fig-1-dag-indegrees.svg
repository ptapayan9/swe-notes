<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" role="img" aria-labelledby="title desc">
  <title id="title">Course-prerequisite DAG with indegree labels</title>
  <desc id="desc">Seven course nodes connected by arrows from prerequisite to dependent course. Each node carries a badge showing its indegree. CS101 and MATH110 have indegree 0 and are ready immediately; CS490 has indegree 3 and unlocks last.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .node { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .badge0 { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .badgeN { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .edge { stroke: #4b5563; stroke-width: 2.5; fill: none; }
  </style>
  <rect width="1200" height="580" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4b5563"/>
    </marker>
  </defs>
  <text class="t" x="40" y="58">Course-prerequisite DAG with indegrees</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#e5e7eb" stroke-width="2"/>

  <!-- edges -->
  <line class="edge" x1="275" y1="235" x2="403" y2="305" marker-end="url(#arr)"/>
  <line class="edge" x1="275" y1="405" x2="403" y2="335" marker-end="url(#arr)"/>
  <line class="edge" x1="555" y1="305" x2="683" y2="203" marker-end="url(#arr)"/>
  <line class="edge" x1="555" y1="320" x2="683" y2="320" marker-end="url(#arr)"/>
  <line class="edge" x1="555" y1="335" x2="683" y2="437" marker-end="url(#arr)"/>
  <line class="edge" x1="835" y1="203" x2="953" y2="305" marker-end="url(#arr)"/>
  <line class="edge" x1="835" y1="320" x2="953" y2="320" marker-end="url(#arr)"/>
  <line class="edge" x1="835" y1="437" x2="953" y2="335" marker-end="url(#arr)"/>

  <!-- CS101 -->
  <rect class="node" x="125" y="205" width="150" height="60" rx="10"/>
  <text class="b" x="200" y="243" text-anchor="middle">CS101</text>
  <circle class="badge0" cx="200" cy="187" r="20"/>
  <text class="b" x="200" y="195" text-anchor="middle">0</text>

  <!-- MATH110 -->
  <rect class="node" x="125" y="375" width="150" height="60" rx="10"/>
  <text class="b" x="200" y="413" text-anchor="middle">MATH110</text>
  <circle class="badge0" cx="200" cy="357" r="20"/>
  <text class="b" x="200" y="365" text-anchor="middle">0</text>

  <!-- CS201 -->
  <rect class="node" x="405" y="290" width="150" height="60" rx="10"/>
  <text class="b" x="480" y="328" text-anchor="middle">CS201</text>
  <circle class="badgeN" cx="480" cy="272" r="20"/>
  <text class="b" x="480" y="280" text-anchor="middle">2</text>

  <!-- CS301 -->
  <rect class="node" x="685" y="165" width="150" height="60" rx="10"/>
  <text class="b" x="760" y="203" text-anchor="middle">CS301</text>
  <circle class="badgeN" cx="760" cy="147" r="20"/>
  <text class="b" x="760" y="155" text-anchor="middle">1</text>

  <!-- CS320 -->
  <rect class="node" x="685" y="290" width="150" height="60" rx="10"/>
  <text class="b" x="760" y="328" text-anchor="middle">CS320</text>
  <circle class="badgeN" cx="760" cy="272" r="20"/>
  <text class="b" x="760" y="280" text-anchor="middle">1</text>

  <!-- CS330 -->
  <rect class="node" x="685" y="415" width="150" height="60" rx="10"/>
  <text class="b" x="760" y="453" text-anchor="middle">CS330</text>
  <circle class="badgeN" cx="760" cy="397" r="20"/>
  <text class="b" x="760" y="405" text-anchor="middle">1</text>

  <!-- CS490 -->
  <rect class="node" x="955" y="290" width="150" height="60" rx="10"/>
  <text class="b" x="1030" y="328" text-anchor="middle">CS490</text>
  <circle class="badgeN" cx="1030" cy="272" r="20"/>
  <text class="b" x="1030" y="280" text-anchor="middle">3</text>

  <!-- legend -->
  <circle class="badge0" cx="60" cy="530" r="14"/>
  <text class="s" x="85" y="537">indegree 0 — ready now</text>
  <circle class="badgeN" cx="345" cy="530" r="14"/>
  <text class="s" x="370" y="537">indegree &gt; 0 — blocked until prerequisites finish</text>
  <line class="edge" x1="840" y1="530" x2="905" y2="530" marker-end="url(#arr)"/>
  <text class="s" x="920" y="537">edge u → v means “u before v”</text>
</svg>
