<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Huffman coding: five greedy merges of the two smallest frequencies</title>
  <desc id="desc">Five rows trace a min-heap. Each row pops the two smallest frequencies (red cells), pushes their sum (green cell), and shows the remaining heap contents sorted. Frequencies 5, 9, 12, 13, 16, 45 merge down to a single root of weight 100.</desc>
  <style>
    .t    { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .s    { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .c    { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .pop  { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .new  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .heap { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .rule { stroke: #e5e7eb; stroke-width: 2; }
  </style>
  <rect width="1200" height="700" fill="#ffffff"/>

  <text x="60" y="58" class="t">Huffman coding — n−1 greedy merges</text>
  <line x1="60" y1="78" x2="1140" y2="78" class="rule"/>

  <text x="60" y="122" class="s">start heap (freq · symbol): 5·f   9·e   12·c   13·b   16·d   45·a — pop two smallest (red), push their sum (green)</text>

  <!-- Row 1: 5 + 9 -> 14 ; heap: 12 13 14 16 45 -->
  <rect x="60" y="160" width="80" height="60" rx="8" class="pop"/>
  <text x="100" y="198" text-anchor="middle" class="c">5</text>
  <text x="160" y="198" text-anchor="middle" class="b">+</text>
  <rect x="180" y="160" width="80" height="60" rx="8" class="pop"/>
  <text x="220" y="198" text-anchor="middle" class="c">9</text>
  <text x="290" y="198" text-anchor="middle" class="b">→</text>
  <rect x="320" y="160" width="96" height="60" rx="8" class="new"/>
  <text x="368" y="198" text-anchor="middle" class="c">14</text>
  <text x="470" y="198" class="s">heap now:</text>
  <rect x="600" y="160" width="80" height="60" rx="8" class="heap"/>
  <text x="640" y="198" text-anchor="middle" class="c">12</text>
  <rect x="696" y="160" width="80" height="60" rx="8" class="heap"/>
  <text x="736" y="198" text-anchor="middle" class="c">13</text>
  <rect x="792" y="160" width="80" height="60" rx="8" class="new"/>
  <text x="832" y="198" text-anchor="middle" class="c">14</text>
  <rect x="888" y="160" width="80" height="60" rx="8" class="heap"/>
  <text x="928" y="198" text-anchor="middle" class="c">16</text>
  <rect x="984" y="160" width="80" height="60" rx="8" class="heap"/>
  <text x="1024" y="198" text-anchor="middle" class="c">45</text>

  <!-- Row 2: 12 + 13 -> 25 ; heap: 14 16 25 45 -->
  <rect x="60" y="250" width="80" height="60" rx="8" class="pop"/>
  <text x="100" y="288" text-anchor="middle" class="c">12</text>
  <text x="160" y="288" text-anchor="middle" class="b">+</text>
  <rect x="180" y="250" width="80" height="60" rx="8" class="pop"/>
  <text x="220" y="288" text-anchor="middle" class="c">13</text>
  <text x="290" y="288" text-anchor="middle" class="b">→</text>
  <rect x="320" y="250" width="96" height="60" rx="8" class="new"/>
  <text x="368" y="288" text-anchor="middle" class="c">25</text>
  <text x="470" y="288" class="s">heap now:</text>
  <rect x="600" y="250" width="80" height="60" rx="8" class="heap"/>
  <text x="640" y="288" text-anchor="middle" class="c">14</text>
  <rect x="696" y="250" width="80" height="60" rx="8" class="heap"/>
  <text x="736" y="288" text-anchor="middle" class="c">16</text>
  <rect x="792" y="250" width="80" height="60" rx="8" class="new"/>
  <text x="832" y="288" text-anchor="middle" class="c">25</text>
  <rect x="888" y="250" width="80" height="60" rx="8" class="heap"/>
  <text x="928" y="288" text-anchor="middle" class="c">45</text>

  <!-- Row 3: 14 + 16 -> 30 ; heap: 25 30 45 -->
  <rect x="60" y="340" width="80" height="60" rx="8" class="pop"/>
  <text x="100" y="378" text-anchor="middle" class="c">14</text>
  <text x="160" y="378" text-anchor="middle" class="b">+</text>
  <rect x="180" y="340" width="80" height="60" rx="8" class="pop"/>
  <text x="220" y="378" text-anchor="middle" class="c">16</text>
  <text x="290" y="378" text-anchor="middle" class="b">→</text>
  <rect x="320" y="340" width="96" height="60" rx="8" class="new"/>
  <text x="368" y="378" text-anchor="middle" class="c">30</text>
  <text x="470" y="378" class="s">heap now:</text>
  <rect x="600" y="340" width="80" height="60" rx="8" class="heap"/>
  <text x="640" y="378" text-anchor="middle" class="c">25</text>
  <rect x="696" y="340" width="80" height="60" rx="8" class="new"/>
  <text x="736" y="378" text-anchor="middle" class="c">30</text>
  <rect x="792" y="340" width="80" height="60" rx="8" class="heap"/>
  <text x="832" y="378" text-anchor="middle" class="c">45</text>

  <!-- Row 4: 25 + 30 -> 55 ; heap: 45 55 -->
  <rect x="60" y="430" width="80" height="60" rx="8" class="pop"/>
  <text x="100" y="468" text-anchor="middle" class="c">25</text>
  <text x="160" y="468" text-anchor="middle" class="b">+</text>
  <rect x="180" y="430" width="80" height="60" rx="8" class="pop"/>
  <text x="220" y="468" text-anchor="middle" class="c">30</text>
  <text x="290" y="468" text-anchor="middle" class="b">→</text>
  <rect x="320" y="430" width="96" height="60" rx="8" class="new"/>
  <text x="368" y="468" text-anchor="middle" class="c">55</text>
  <text x="470" y="468" class="s">heap now:</text>
  <rect x="600" y="430" width="80" height="60" rx="8" class="heap"/>
  <text x="640" y="468" text-anchor="middle" class="c">45</text>
  <rect x="696" y="430" width="80" height="60" rx="8" class="new"/>
  <text x="736" y="468" text-anchor="middle" class="c">55</text>

  <!-- Row 5: 45 + 55 -> 100 ; heap: 100 -->
  <rect x="60" y="520" width="80" height="60" rx="8" class="pop"/>
  <text x="100" y="558" text-anchor="middle" class="c">45</text>
  <text x="160" y="558" text-anchor="middle" class="b">+</text>
  <rect x="180" y="520" width="80" height="60" rx="8" class="pop"/>
  <text x="220" y="558" text-anchor="middle" class="c">55</text>
  <text x="290" y="558" text-anchor="middle" class="b">→</text>
  <rect x="320" y="520" width="96" height="60" rx="8" class="new"/>
  <text x="368" y="558" text-anchor="middle" class="c">100</text>
  <text x="470" y="558" class="s">heap now:</text>
  <rect x="600" y="520" width="96" height="60" rx="8" class="new"/>
  <text x="648" y="558" text-anchor="middle" class="c">100</text>
  <text x="730" y="558" class="s">← root: done after n − 1 = 5 merges</text>

  <text x="600" y="632" text-anchor="middle" class="m">Rare symbols merge early and sink deep (f, e get 4-bit codes);</text>
  <text x="600" y="664" text-anchor="middle" class="m">frequent ‘a’ (45) merges last and gets a 1-bit code. Total: 224 bits vs 300 for fixed 3-bit codes.</text>
</svg>
