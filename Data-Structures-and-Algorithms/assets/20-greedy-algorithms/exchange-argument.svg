<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img" aria-labelledby="title desc">
  <title id="title">The exchange argument: swapping the greedy pick into an optimal solution</title>
  <desc id="desc">Two rows of intervals. The optimal solution O and the greedy solution G share a prefix of identical intervals. At position j, greedy's pick finishes earlier than optimal's pick, so a purple swap arrow shows replacing o_j with g_j keeps the solution feasible and the same size.</desc>
  <style>
    .t    { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .s    { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .pur  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8b5cf6; font-weight: 700; }
    .same { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .opt  { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .grd  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .tail { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .rule { stroke: #e5e7eb; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>

  <text x="60" y="58" class="t">The exchange argument — swap in the greedy pick</text>
  <line x1="60" y1="78" x2="1140" y2="78" class="rule"/>

  <!-- Optimal row -->
  <text x="60" y="193" class="b">Optimal O</text>
  <rect x="240" y="160" width="150" height="52" rx="8" class="same"/>
  <text x="315" y="194" text-anchor="middle" class="b">o₁ = g₁</text>
  <rect x="420" y="160" width="150" height="52" rx="8" class="same"/>
  <text x="495" y="194" text-anchor="middle" class="b">o₂ = g₂</text>
  <rect x="600" y="160" width="270" height="52" rx="8" class="opt"/>
  <text x="735" y="194" text-anchor="middle" class="b">oⱼ</text>
  <text x="735" y="148" text-anchor="middle" class="s">finishes at f(oⱼ)</text>
  <rect x="910" y="160" width="180" height="52" rx="8" class="tail"/>
  <text x="1000" y="194" text-anchor="middle" class="m">oⱼ₊₁</text>

  <!-- Greedy row -->
  <text x="60" y="393" class="b">Greedy G</text>
  <rect x="240" y="360" width="150" height="52" rx="8" class="same"/>
  <text x="315" y="394" text-anchor="middle" class="b">g₁</text>
  <rect x="420" y="360" width="150" height="52" rx="8" class="same"/>
  <text x="495" y="394" text-anchor="middle" class="b">g₂</text>
  <rect x="600" y="360" width="190" height="52" rx="8" class="grd"/>
  <text x="695" y="394" text-anchor="middle" class="b">gⱼ</text>
  <text x="695" y="446" text-anchor="middle" class="s">finishes at f(gⱼ) ≤ f(oⱼ)</text>

  <!-- swap arrow -->
  <line x1="695" y1="352" x2="695" y2="222" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <text x="715" y="280" class="pur">swap oⱼ → gⱼ</text>
  <text x="715" y="310" class="s">gⱼ still ends before oⱼ₊₁ starts</text>

  <text x="600" y="478" text-anchor="middle" class="m">gⱼ finishes no later than oⱼ, so the swap keeps O feasible and the same size.</text>
  <text x="600" y="508" text-anchor="middle" class="m">Repeat left to right: O morphs into G, so |G| = |O| — greedy is optimal.</text>
</svg>
