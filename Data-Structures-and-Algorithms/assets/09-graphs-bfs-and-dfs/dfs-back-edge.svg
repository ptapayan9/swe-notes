<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" role="img" aria-labelledby="title desc">
  <title id="title">DFS tree with a back edge into a gray ancestor</title>
  <desc id="desc">A depth-first search tree rooted at A. Nodes A, B, C, and D are gray because they sit on the recursion stack. Node E is black because it is fully explored. Node F is white and not yet visited. A dashed red back edge from D to B closes a cycle. A legend on the right explains the colors and edge styles.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .gray  { fill: #fef3c7; stroke: #fcd34d; stroke-width: 3; }
    .black { fill: #dcfce7; stroke: #86efac; stroke-width: 3; }
    .white { fill: #ffffff; stroke: #6b7280; stroke-width: 3; }
    .tree  { stroke: #111827; stroke-width: 3; fill: none; }
    .back  { stroke: #ef4444; stroke-width: 3.5; stroke-dasharray: 10 8; fill: none; }
    .undisc { stroke: #e5e7eb; stroke-width: 3; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="1200" height="680" fill="#ffffff"/>

  <text x="40" y="60" class="t">DFS: a back edge to a gray node = cycle</text>
  <line x1="40" y1="82" x2="1160" y2="82" class="rule"/>

  <defs>
    <marker id="arrDark" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- undiscovered edge D - F -->
  <line x1="390" y1="600" x2="540" y2="600" class="undisc"/>

  <!-- tree edges (directed) -->
  <line x1="475" y1="195" x2="390" y2="280" class="tree" marker-end="url(#arrDark)"/>
  <line x1="525" y1="195" x2="615" y2="280" class="tree" marker-end="url(#arrDark)"/>
  <line x1="360" y1="342" x2="360" y2="418" class="tree" marker-end="url(#arrDark)"/>
  <line x1="360" y1="482" x2="360" y2="558" class="tree" marker-end="url(#arrDark)"/>

  <!-- back edge D -> B -->
  <path d="M 328,588 C 210,520 210,380 322,322" class="back" marker-end="url(#arrRed)"/>
  <text x="150" y="440" class="s" text-anchor="middle">back edge</text>
  <text x="150" y="465" class="s" text-anchor="middle">D → B (cycle)</text>

  <!-- nodes -->
  <circle cx="500" cy="170" r="32" class="gray"/>
  <text x="500" y="180" class="b" text-anchor="middle" font-weight="700">A</text>

  <circle cx="360" cy="310" r="32" class="gray"/>
  <text x="360" y="320" class="b" text-anchor="middle" font-weight="700">B</text>

  <circle cx="640" cy="310" r="32" class="black"/>
  <text x="640" y="320" class="b" text-anchor="middle" font-weight="700">E</text>

  <circle cx="360" cy="450" r="32" class="gray"/>
  <text x="360" y="460" class="b" text-anchor="middle" font-weight="700">C</text>

  <circle cx="360" cy="590" r="32" class="gray"/>
  <text x="360" y="600" class="b" text-anchor="middle" font-weight="700">D</text>

  <circle cx="572" cy="600" r="32" class="white"/>
  <text x="572" y="610" class="b" text-anchor="middle" font-weight="700">F</text>

  <!-- legend -->
  <rect x="790" y="150" width="36" height="36" rx="8" class="gray"/>
  <text x="844" y="176" class="m">gray — on the recursion stack right now</text>

  <rect x="790" y="215" width="36" height="36" rx="8" class="black"/>
  <text x="844" y="241" class="m">black — fully explored, all edges done</text>

  <rect x="790" y="280" width="36" height="36" rx="8" class="white"/>
  <text x="844" y="306" class="m">white — not yet discovered</text>

  <line x1="790" y1="365" x2="826" y2="365" class="tree" marker-end="url(#arrDark)"/>
  <text x="844" y="373" class="m">tree edge — first discovery of a node</text>

  <line x1="790" y1="430" x2="826" y2="430" class="back"/>
  <text x="844" y="438" class="m">back edge — points at a gray ancestor</text>

  <text x="790" y="510" class="s">Current recursion stack: A → B → C → D.</text>
  <text x="790" y="538" class="s">D sees B while B is still gray, so the edge</text>
  <text x="790" y="566" class="s">D → B closes a cycle B → C → D → B.</text>
</svg>
