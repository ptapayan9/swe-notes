<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Decision tree for comparison-sorting three elements</title>
  <desc id="desc">A binary decision tree with comparison nodes a:b, a:c, b:c and six leaves, one per permutation of three elements. Annotation explains that n! leaves force a tree height of at least log2(n!), which is Omega(n log n).</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .node  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .leaf  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .edge  { stroke: #6b7280; stroke-width: 2; fill: none; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="1200" height="620" fill="#ffffff"/>
  <text class="title" x="40" y="52">Why comparisons cost n log n: the decision tree</text>
  <line class="rule" x1="40" y1="72" x2="1160" y2="72"/>

  <!-- edges -->
  <line class="edge" x1="600" y1="176" x2="340" y2="244"/>
  <line class="edge" x1="600" y1="176" x2="860" y2="244"/>
  <line class="edge" x1="340" y1="296" x2="180" y2="364"/>
  <line class="edge" x1="340" y1="296" x2="480" y2="364"/>
  <line class="edge" x1="860" y1="296" x2="720" y2="364"/>
  <line class="edge" x1="860" y1="296" x2="1000" y2="364"/>
  <line class="edge" x1="480" y1="416" x2="370" y2="474"/>
  <line class="edge" x1="480" y1="416" x2="590" y2="474"/>
  <line class="edge" x1="1000" y1="416" x2="890" y2="474"/>
  <line class="edge" x1="1000" y1="416" x2="1110" y2="474"/>

  <!-- edge labels -->
  <text class="small" x="448" y="202" text-anchor="end">a &#8804; b</text>
  <text class="small" x="752" y="202" text-anchor="start">a &gt; b</text>
  <text class="small" x="238" y="326" text-anchor="end">b &#8804; c</text>
  <text class="small" x="432" y="326" text-anchor="start">b &gt; c</text>
  <text class="small" x="772" y="326" text-anchor="end">a &#8804; c</text>
  <text class="small" x="952" y="326" text-anchor="start">a &gt; c</text>
  <text class="small" x="408" y="442" text-anchor="end">a &#8804; c</text>
  <text class="small" x="552" y="442" text-anchor="start">a &gt; c</text>
  <text class="small" x="928" y="442" text-anchor="end">b &#8804; c</text>
  <text class="small" x="1072" y="442" text-anchor="start">b &gt; c</text>

  <!-- internal nodes -->
  <rect class="node" x="535" y="124" width="130" height="52" rx="10"/>
  <text class="code" x="600" y="158" text-anchor="middle">a : b</text>
  <rect class="node" x="275" y="244" width="130" height="52" rx="10"/>
  <text class="code" x="340" y="278" text-anchor="middle">b : c</text>
  <rect class="node" x="795" y="244" width="130" height="52" rx="10"/>
  <text class="code" x="860" y="278" text-anchor="middle">a : c</text>
  <rect class="node" x="415" y="364" width="130" height="52" rx="10"/>
  <text class="code" x="480" y="398" text-anchor="middle">a : c</text>
  <rect class="node" x="935" y="364" width="130" height="52" rx="10"/>
  <text class="code" x="1000" y="398" text-anchor="middle">b : c</text>

  <!-- leaves -->
  <rect class="leaf" x="100" y="364" width="160" height="52" rx="10"/>
  <text class="body" x="180" y="398" text-anchor="middle">&#10216;a, b, c&#10217;</text>
  <rect class="leaf" x="640" y="364" width="160" height="52" rx="10"/>
  <text class="body" x="720" y="398" text-anchor="middle">&#10216;b, a, c&#10217;</text>
  <rect class="leaf" x="290" y="474" width="160" height="52" rx="10"/>
  <text class="body" x="370" y="508" text-anchor="middle">&#10216;a, c, b&#10217;</text>
  <rect class="leaf" x="510" y="474" width="160" height="52" rx="10"/>
  <text class="body" x="590" y="508" text-anchor="middle">&#10216;c, a, b&#10217;</text>
  <rect class="leaf" x="810" y="474" width="160" height="52" rx="10"/>
  <text class="body" x="890" y="508" text-anchor="middle">&#10216;b, c, a&#10217;</text>
  <rect class="leaf" x="1030" y="474" width="160" height="52" rx="10"/>
  <text class="body" x="1110" y="508" text-anchor="middle">&#10216;c, b, a&#10217;</text>

  <!-- annotation -->
  <text class="body" x="600" y="570" text-anchor="middle">6 leaves = 3! orderings &#8594; worst-case path &#8805; &#8968;log&#8322; 6&#8969; = 3 comparisons.</text>
  <text class="small" x="600" y="600" text-anchor="middle">In general: n! leaves force height &#8805; log&#8322;(n!) = &#937;(n log n). Every comparison sort is one root-to-leaf walk.</text>
</svg>
