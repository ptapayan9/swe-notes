<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Lomuto partition invariant mid-pass</title>
  <desc id="desc">Top row: the array 1 2 4 5 7 8 3 mid-partition with pivot 3, region a[0..1] less-or-equal pivot in green, region a[2..4] greater than pivot in red, index 5 unscanned, pivot amber at index 6, pointers i equals 1 and j equals 5. Bottom row: after the final swap the pivot 3 sits at index 2, its final sorted position.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; text-anchor: middle; }
    .ci { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #8b5cf6; text-anchor: middle; }
    .cj { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #0ea5e9; text-anchor: middle; }
    .v  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; text-anchor: middle; }
    .i  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; text-anchor: middle; }
    .cap { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
  </style>
  <rect width="1200" height="700" fill="#ffffff"/>
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <text class="t" x="40" y="56">Lomuto partition &#8212; the invariant, frozen mid-pass</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Legend -->
  <rect x="280" y="104" width="24" height="24" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="s" x="314" y="122">&#8804; pivot</text>
  <rect x="450" y="104" width="24" height="24" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="s" x="484" y="122">&gt; pivot</text>
  <rect x="620" y="104" width="24" height="24" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="s" x="654" y="122">unscanned</text>
  <rect x="810" y="104" width="24" height="24" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="s" x="844" y="122">pivot</text>

  <!-- Row 1: mid-pass -->
  <rect x="280" y="160" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="380" y="160" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="480" y="160" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="580" y="160" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="680" y="160" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="780" y="160" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="880" y="160" width="100" height="70" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="v" x="330" y="203">1</text>
  <text class="v" x="430" y="203">2</text>
  <text class="v" x="530" y="203">4</text>
  <text class="v" x="630" y="203">5</text>
  <text class="v" x="730" y="203">7</text>
  <text class="v" x="830" y="203">8</text>
  <text class="v" x="930" y="203">3</text>
  <text class="i" x="330" y="256">0</text>
  <text class="i" x="430" y="256">1</text>
  <text class="i" x="530" y="256">2</text>
  <text class="i" x="630" y="256">3</text>
  <text class="i" x="730" y="256">4</text>
  <text class="i" x="830" y="256">5</text>
  <text class="i" x="930" y="256">6</text>

  <!-- Pointers -->
  <line x1="430" y1="330" x2="430" y2="272" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrP)"/>
  <text class="ci" x="430" y="364">i = 1</text>
  <line x1="830" y1="330" x2="830" y2="272" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrB)"/>
  <text class="cj" x="830" y="364">j = 5</text>

  <!-- Invariant -->
  <text class="c" x="600" y="424">a[lo..i] &#8804; pivot &#160;&#160;|&#160;&#160; a[i+1..j-1] &gt; pivot &#160;&#160;|&#160;&#160; a[j..hi-1] unscanned</text>

  <!-- Row 2: after final swap -->
  <text class="cap" x="160" y="476">After the scan, one swap of a[i+1] and a[hi] seats the pivot between the regions:</text>
  <rect x="280" y="500" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="380" y="500" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="480" y="500" width="100" height="70" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <rect x="580" y="500" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="680" y="500" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="780" y="500" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <rect x="880" y="500" width="100" height="70" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="v" x="330" y="543">1</text>
  <text class="v" x="430" y="543">2</text>
  <text class="v" x="530" y="543">3</text>
  <text class="v" x="630" y="543">5</text>
  <text class="v" x="730" y="543">7</text>
  <text class="v" x="830" y="543">8</text>
  <text class="v" x="930" y="543">4</text>
  <text class="i" x="330" y="596">0</text>
  <text class="i" x="430" y="596">1</text>
  <text class="i" x="530" y="596">2</text>
  <text class="i" x="630" y="596">3</text>
  <text class="i" x="730" y="596">4</text>
  <text class="i" x="830" y="596">5</text>
  <text class="i" x="930" y="596">6</text>

  <text class="cap" x="160" y="650">Pivot 3 lands at index i+1 = 2 &#8212; its final position. Recurse on a[0..1] and a[3..6].</text>
</svg>
