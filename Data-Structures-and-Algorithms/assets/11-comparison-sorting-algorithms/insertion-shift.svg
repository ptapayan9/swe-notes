<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">Insertion sort shifting the key into place</title>
  <desc id="desc">Three rows showing one insertion sort pass on the array 2 5 7 9 3 8 1: the key 3 is lifted out of index 4, the sorted-prefix elements 9, 7, 5 each shift one slot right, and the key drops into the hole at index 1.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .v  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; text-anchor: middle; }
    .i  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; text-anchor: middle; }
    .cap { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
  </style>
  <rect width="1200" height="660" fill="#ffffff"/>
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <text class="t" x="40" y="56">Insertion sort &#8212; shift right, then drop the key in</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Row 1: lift the key -->
  <text class="b" x="40" y="155">1 &#183; lift</text>
  <rect x="280" y="110" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="380" y="110" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="480" y="110" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="580" y="110" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="680" y="110" width="100" height="70" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <rect x="780" y="110" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="880" y="110" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="v" x="330" y="153">2</text>
  <text class="v" x="430" y="153">5</text>
  <text class="v" x="530" y="153">7</text>
  <text class="v" x="630" y="153">9</text>
  <text class="v" x="730" y="153">3</text>
  <text class="v" x="830" y="153">8</text>
  <text class="v" x="930" y="153">1</text>
  <text class="i" x="330" y="206">0</text>
  <text class="i" x="430" y="206">1</text>
  <text class="i" x="530" y="206">2</text>
  <text class="i" x="630" y="206">3</text>
  <text class="i" x="730" y="206">4</text>
  <text class="i" x="830" y="206">5</text>
  <text class="i" x="930" y="206">6</text>
  <text class="c" x="1000" y="153">key = 3</text>
  <text class="cap" x="160" y="244">Pass i = 4: prefix a[0..3] sorted (green); key = a[4] = 3 saved in a temp.</text>

  <!-- Row 2: shifts -->
  <text class="b" x="40" y="375">2 &#183; shift</text>
  <path d="M430,322 Q480,290 524,318" fill="none" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrB)"/>
  <path d="M530,322 Q580,290 624,318" fill="none" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrB)"/>
  <path d="M630,322 Q680,290 724,318" fill="none" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrB)"/>
  <rect x="280" y="330" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="380" y="330" width="100" height="70" fill="#ffffff" stroke="#38bdf8" stroke-width="2" stroke-dasharray="8 6"/>
  <rect x="480" y="330" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="580" y="330" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="680" y="330" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="780" y="330" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="880" y="330" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="v" x="330" y="373">2</text>
  <text class="i" x="430" y="373">hole</text>
  <text class="v" x="530" y="373">5</text>
  <text class="v" x="630" y="373">7</text>
  <text class="v" x="730" y="373">9</text>
  <text class="v" x="830" y="373">8</text>
  <text class="v" x="930" y="373">1</text>
  <text class="i" x="330" y="426">0</text>
  <text class="i" x="430" y="426">1</text>
  <text class="i" x="530" y="426">2</text>
  <text class="i" x="630" y="426">3</text>
  <text class="i" x="730" y="426">4</text>
  <text class="i" x="830" y="426">5</text>
  <text class="i" x="930" y="426">6</text>
  <text class="cap" x="160" y="464">9 &gt; 3, 7 &gt; 3, 5 &gt; 3 &#8594; each shifts one slot right; 2 &#8804; 3 stops the scan.</text>

  <!-- Row 3: drop the key -->
  <text class="b" x="40" y="565">3 &#183; drop</text>
  <rect x="280" y="520" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="380" y="520" width="100" height="70" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <rect x="480" y="520" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="580" y="520" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="680" y="520" width="100" height="70" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="780" y="520" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="880" y="520" width="100" height="70" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="v" x="330" y="563">2</text>
  <text class="v" x="430" y="563">3</text>
  <text class="v" x="530" y="563">5</text>
  <text class="v" x="630" y="563">7</text>
  <text class="v" x="730" y="563">9</text>
  <text class="v" x="830" y="563">8</text>
  <text class="v" x="930" y="563">1</text>
  <text class="i" x="330" y="616">0</text>
  <text class="i" x="430" y="616">1</text>
  <text class="i" x="530" y="616">2</text>
  <text class="i" x="630" y="616">3</text>
  <text class="i" x="730" y="616">4</text>
  <text class="i" x="830" y="616">5</text>
  <text class="i" x="930" y="616">6</text>
  <text class="cap" x="160" y="650">Key drops into the hole at index 1 &#8212; prefix a[0..4] now sorted; 8 and 1 pending.</text>
</svg>
