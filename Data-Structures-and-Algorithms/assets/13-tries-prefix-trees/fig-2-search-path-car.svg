<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">The walk for starts_with("car")</title>
  <desc id="desc">The same trie of cat, car, card, care. The path root to c to a to r is highlighted in blue with numbered steps 1, 2, 3. The stop node r is amber. Untouched nodes are gray. The left panel lists the three dictionary lookups.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cm { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #9ca3af; }
    .pathedge  { stroke: #0ea5e9; stroke-width: 5; }
    .mutededge { stroke: #e5e7eb; stroke-width: 2.5; }
    .pathnode  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2.5; }
    .stopnode  { fill: #fef3c7; stroke: #fcd34d; stroke-width: 3; }
    .mutednode { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2.5; }
    .badge     { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .badgetxt  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
  </style>
  <rect width="1200" height="700" fill="#ffffff"/>

  <text class="t" x="40" y="58">The walk for starts_with("car")</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#e5e7eb" stroke-width="2"/>

  <!-- muted edges first -->
  <line class="mutededge" x1="740" y1="376" x2="600" y2="490"/>
  <line class="mutededge" x1="880" y1="490" x2="790" y2="606"/>
  <line class="mutededge" x1="880" y1="490" x2="970" y2="606"/>

  <!-- highlighted path edges -->
  <line class="pathedge" x1="740" y1="160" x2="740" y2="268"/>
  <line class="pathedge" x1="740" y1="268" x2="740" y2="376"/>
  <line class="pathedge" x1="740" y1="376" x2="880" y2="490"/>

  <!-- nodes -->
  <circle class="pathnode"  cx="740" cy="160" r="36"/>
  <circle class="pathnode"  cx="740" cy="268" r="36"/>
  <circle class="pathnode"  cx="740" cy="376" r="36"/>
  <circle class="mutednode" cx="600" cy="490" r="36"/>
  <circle class="stopnode"  cx="880" cy="490" r="36"/>
  <circle class="mutednode" cx="790" cy="606" r="36"/>
  <circle class="mutednode" cx="970" cy="606" r="36"/>

  <!-- node characters -->
  <text class="c"  x="740" y="277" text-anchor="middle">c</text>
  <text class="c"  x="740" y="385" text-anchor="middle">a</text>
  <text class="cm" x="600" y="499" text-anchor="middle">t</text>
  <text class="c"  x="880" y="499" text-anchor="middle">r</text>
  <text class="cm" x="790" y="615" text-anchor="middle">d</text>
  <text class="cm" x="970" y="615" text-anchor="middle">e</text>

  <text class="s" x="786" y="156">root</text>
  <text class="s" x="926" y="466">walk stops here</text>

  <!-- step badges -->
  <circle class="badge" cx="698" cy="214" r="16"/>
  <text class="badgetxt" x="698" y="221" text-anchor="middle">1</text>
  <circle class="badge" cx="698" cy="322" r="16"/>
  <text class="badgetxt" x="698" y="329" text-anchor="middle">2</text>
  <circle class="badge" cx="842" cy="412" r="16"/>
  <text class="badgetxt" x="842" y="419" text-anchor="middle">3</text>

  <!-- left panel -->
  <text class="c" x="40" y="150">t.starts_with("car")</text>
  <text class="b" x="40" y="204">Step 1: children["c"]? found</text>
  <text class="b" x="40" y="240">Step 2: children["a"]? found</text>
  <text class="b" x="40" y="276">Step 3: children["r"]? found</text>
  <text class="b" x="40" y="330">Walk survived all 3 chars,</text>
  <text class="b" x="40" y="362">so the call returns True.</text>

  <text class="m" x="40" y="424">Cost: exactly 3 dict lookups.</text>
  <text class="m" x="40" y="456">O(P) in the prefix length,</text>
  <text class="m" x="40" y="488">whether the trie holds 4 words</text>
  <text class="m" x="40" y="520">or 4 million.</text>

  <!-- legend -->
  <rect class="pathnode" x="40" y="560" width="26" height="26"/>
  <text class="s" x="80" y="579">node visited by the walk</text>
  <rect class="stopnode" x="40" y="600" width="26" height="26"/>
  <text class="s" x="80" y="619">node where the walk stops</text>
  <rect class="mutednode" x="40" y="640" width="26" height="26"/>
  <text class="s" x="80" y="659">never touched: cost is independent of trie size</text>
</svg>
