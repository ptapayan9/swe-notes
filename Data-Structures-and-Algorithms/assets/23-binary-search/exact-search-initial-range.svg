<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Binary search initial range</title>
  <desc id="desc">A sorted array with left, mid, and right pointers showing the initial binary search range for target 8.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 25px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .index { font: 500 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .value { font: 500 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .cell { fill: #fbf8ea; stroke: #b8b8aa; stroke-width: 1.5; }
      .left { fill: #0ea5e9; }
      .mid { fill: #d63384; }
      .right { fill: #ef3b2d; }
      .bracket { stroke: #8b5cf6; stroke-width: 5; stroke-linecap: round; }
      .faint { fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620"/>
  <text class="title" x="64" y="76">Implementation</text>
  <line class="rule" x1="64" y1="104" x2="1136" y2="104"/>

  <text class="body" x="64" y="158">Binary search keeps a shrinking range from</text>
  <text class="mono" x="553" y="158">left</text>
  <text class="body" x="626" y="158">to</text>
  <text class="mono" x="660" y="158">right</text>
  <text class="body" x="750" y="158">and checks</text>
  <text class="mono" x="879" y="158">mid</text>
  <text class="body" x="934" y="158">.</text>

  <text class="body" x="64" y="207">Each comparison discards one half of the remaining candidates.</text>
  <text class="body" x="64" y="273">Time Complexity:</text>
  <text class="mono" x="283" y="273">O(log n)</text>
  <text class="body" x="64" y="317">Extra Space:</text>
  <text class="mono" x="222" y="317">O(1)</text>

  <text class="small" x="560" y="252">target = 8</text>
  <line class="bracket" x1="308" y1="405" x2="893" y2="405"/>
  <circle cx="308" cy="405" r="7" fill="#8b5cf6"/>
  <circle cx="893" cy="405" r="7" fill="#8b5cf6"/>

  <g transform="translate(300 330)">
    <rect class="cell" x="0" y="0" width="110" height="74"/>
    <rect class="cell" x="110" y="0" width="110" height="74"/>
    <rect class="cell" x="220" y="0" width="110" height="74"/>
    <rect class="cell" x="330" y="0" width="110" height="74"/>
    <rect class="cell" x="440" y="0" width="110" height="74"/>
    <rect class="cell" x="550" y="0" width="110" height="74"/>

    <text class="value" x="55" y="46" text-anchor="middle">1</text>
    <text class="value" x="165" y="46" text-anchor="middle">3</text>
    <text class="value" x="275" y="46" text-anchor="middle">6</text>
    <text class="value" x="385" y="46" text-anchor="middle">8</text>
    <text class="value" x="495" y="46" text-anchor="middle">9</text>
    <text class="value" x="605" y="46" text-anchor="middle">10</text>

    <text class="index" x="55" y="104" text-anchor="middle">0</text>
    <text class="index" x="165" y="104" text-anchor="middle">1</text>
    <text class="index" x="275" y="104" text-anchor="middle">2</text>
    <text class="index" x="385" y="104" text-anchor="middle">3</text>
    <text class="index" x="495" y="104" text-anchor="middle">4</text>
    <text class="index" x="605" y="104" text-anchor="middle">5</text>

    <polygon class="left" points="55,150 27,198 83,198"/>
    <text class="small" x="55" y="184" text-anchor="middle" fill="#ffffff">L</text>

    <polygon class="mid" points="275,-70 303,-22 247,-22"/>
    <text class="small" x="275" y="-37" text-anchor="middle" fill="#ffffff">M</text>

    <polygon class="right" points="605,-70 633,-22 577,-22"/>
    <text class="small" x="605" y="-37" text-anchor="middle" fill="#ffffff">R</text>
  </g>

  <text class="small faint" x="300" y="576">Invariant: if the target exists, it is still inside the current left/right range.</text>
</svg>
