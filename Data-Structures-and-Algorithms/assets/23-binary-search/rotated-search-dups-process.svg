<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" viewBox="0 0 780 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="780" height="520" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="390" y="28" font-size="15" font-weight="700" fill="#1e293b" text-anchor="middle">Search in Rotated Sorted Array II — Step by Step</text>
  <text x="390" y="48" font-size="12" fill="#64748b" text-anchor="middle">nums = [2, 5, 6, 0, 0, 1, 2] target = 3</text>

  <!-- Step 1 -->
  <text x="30" y="78" font-size="12" font-weight="600" fill="#334155">Step 1: Initial window</text>

  <!-- Full array -->
  <g>
    <!-- Boxes -->
    <rect x="30" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="80" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="130" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="180" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="230" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="280" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="330" y="88" width="48" height="36" rx="3" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>

    <!-- Values -->
    <text x="54" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">2</text>
    <text x="104" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">5</text>
    <text x="154" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">6</text>
    <text x="204" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">0</text>
    <text x="254" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">0</text>
    <text x="304" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">1</text>
    <text x="354" y="112" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">2</text>

    <!-- Indices -->
    <text x="54" y="133" font-size="9" fill="#64748b" text-anchor="middle">0</text>
    <text x="104" y="133" font-size="9" fill="#64748b" text-anchor="middle">1</text>
    <text x="154" y="133" font-size="9" fill="#64748b" text-anchor="middle">2</text>
    <text x="204" y="133" font-size="9" fill="#64748b" text-anchor="middle">3</text>
    <text x="254" y="133" font-size="9" fill="#64748b" text-anchor="middle">4</text>
    <text x="304" y="133" font-size="9" fill="#64748b" text-anchor="middle">5</text>
    <text x="354" y="133" font-size="9" fill="#64748b" text-anchor="middle">6</text>
  </g>

  <!-- Pointers Step 1 -->
  <text x="54" y="152" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle">L</text>
  <text x="204" y="152" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle">M</text>
  <text x="354" y="152" font-size="11" fill="#7c3aed" font-weight="700" text-anchor="middle">R</text>

  <!-- Decision box Step 1 -->
  <rect x="420" y="82" width="330" height="82" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="435" y="100" font-size="11" font-weight="600" fill="#854d0e">Check left-to-mid sorted?</text>
  <text x="435" y="117" font-size="12" fill="#334155">nums[L] &lt;= nums[M] ?</text>
  <text x="435" y="134" font-size="12" fill="#dc2626" font-weight="700">2 &lt;= 0 ?  →  NO</text>
  <text x="435" y="152" font-size="11" fill="#16a34a">→ Right half is sorted</text>

  <!-- Arrow from array to decision -->
  <path d="M 385 105 L 415 105" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <text x="30" y="195" font-size="12" font-weight="600" fill="#334155">Step 2: After first decision (target not in right half)</text>

  <!-- Shrunk window [0..2] -->
  <g>
    <rect x="30" y="205" width="48" height="36" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="80" y="205" width="48" height="36" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <rect x="130" y="205" width="48" height="36" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>

    <text x="54" y="229" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">2</text>
    <text x="104" y="229" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">5</text>
    <text x="154" y="229" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">6</text>

    <text x="54" y="250" font-size="9" fill="#64748b" text-anchor="middle">0</text>
    <text x="104" y="250" font-size="9" fill="#64748b" text-anchor="middle">1</text>
    <text x="154" y="250" font-size="9" fill="#64748b" text-anchor="middle">2</text>
  </g>

  <!-- Pointers Step 2 -->
  <text x="54" y="268" font-size="11" fill="#16a34a" font-weight="700" text-anchor="middle">L</text>
  <text x="104" y="268" font-size="11" fill="#dc2626" font-weight="700" text-anchor="middle">M</text>
  <text x="154" y="268" font-size="11" fill="#7c3aed" font-weight="700" text-anchor="middle">R</text>

  <!-- Decision box Step 2 -->
  <rect x="230" y="200" width="330" height="82" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="245" y="218" font-size="11" font-weight="600" fill="#854d0e">Check left-to-mid sorted?</text>
  <text x="245" y="235" font-size="12" fill="#334155">nums[L] &lt;= nums[M] ?</text>
  <text x="245" y="252" font-size="12" fill="#16a34a" font-weight="700">2 &lt;= 5 ?  →  YES</text>
  <text x="245" y="270" font-size="11" fill="#334155">Left half sorted. Target in [2,5)? Yes → search left</text>

  <!-- Step 3 / Result -->
  <text x="30" y="310" font-size="12" font-weight="600" fill="#334155">Step 3: Final window collapses</text>

  <g>
    <!-- Small final window -->
    <rect x="30" y="320" width="48" height="36" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="54" y="344" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">2</text>
    <text x="54" y="365" font-size="9" fill="#64748b" text-anchor="middle">0</text>

    <text x="100" y="345" font-size="11" fill="#334155">Single element 2 ≠ 3</text>
  </g>

  <!-- Duplicate shrink box -->
  <rect x="230" y="315" width="330" height="50" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="245" y="333" font-size="11" font-weight="600" fill="#9d174d">Duplicate check: nums[L]==nums[M]==nums[R] ?</text>
  <text x="245" y="350" font-size="11" fill="#9d174d" font-weight="700">Yes → left++, right-- → left &gt; right → return False</text>

  <!-- Key insight box at bottom -->
  <rect x="30" y="385" width="720" height="110" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="45" y="408" font-size="11" font-weight="600" fill="#065f46">Core idea in this pattern:</text>
  <text x="45" y="428" font-size="11" fill="#334155">• We never split the array into two fixed halves.</text>
  <text x="45" y="445" font-size="11" fill="#334155">• Every step we only care: <tspan font-weight="600">"Is the segment from current L to current M sorted?"</tspan></text>
  <text x="45" y="462" font-size="11" fill="#334155">• If <tspan font-weight="700">nums[left] &lt;= nums[mid]</tspan> → left-to-mid is sorted → search there if target fits.</text>
  <text x="45" y="479" font-size="11" fill="#334155">• Otherwise the rotation point is between L and M → right half of current window is sorted.</text>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>