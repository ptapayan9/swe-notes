<svg xmlns="http://www.w3.org/2000/svg" width="620" height="145" viewBox="0 0 620 145" font-family="system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="620" height="145" fill="#f8fafc"/>

  <text x="310" y="20" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">The Core Move: Prove → Discard</text>

  <!-- Before -->
  <text x="95" y="42" font-size="11" fill="#475569" text-anchor="middle">Before</text>
  <rect x="30" y="50" width="130" height="35" rx="3" fill="#e2e8f0"/>
  <text x="95" y="73" font-size="12" fill="#334155" text-anchor="middle">Search range [L .......... R]</text>

  <!-- Arrow -->
  <text x="200" y="72" font-size="20" fill="#64748b">→</text>

  <!-- After check -->
  <text x="310" y="42" font-size="11" fill="#475569" text-anchor="middle">After checking mid</text>
  <rect x="240" y="50" width="140" height="35" rx="3" fill="#fef3c7"/>
  <text x="310" y="73" font-size="12" fill="#92400e" text-anchor="middle">We have a proof</text>

  <!-- Arrow -->
  <text x="410" y="72" font-size="20" fill="#64748b">→</text>

  <!-- Discarded -->
  <rect x="440" y="48" width="70" height="38" rx="3" fill="#fecaca" stroke="#ef4444" stroke-dasharray="3,2"/>
  <text x="475" y="73" font-size="11" fill="#b91c1c" text-anchor="middle">DISCARD</text>

  <!-- Kept -->
  <rect x="520" y="48" width="70" height="38" rx="3" fill="#bbf7d0"/>
  <text x="555" y="73" font-size="11" fill="#166534" text-anchor="middle">KEEP</text>

  <!-- Bottom text -->
  <text x="310" y="105" font-size="11" fill="#475569" text-anchor="middle">The entire power of binary search comes from a <tspan font-weight="600">safe discard proof</tspan></text>
  <text x="310" y="122" font-size="11" fill="#475569" text-anchor="middle">at every mid check.</text>
</svg>