<svg xmlns="http://www.w3.org/2000/svg" width="580" height="150" viewBox="0 0 580 150" font-family="system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="580" height="150" fill="#f8fafc"/>
  <text x="290" y="18" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Mountain Peak: Reading the Slope</text>

  <!-- Mountain line -->
  <polyline points="60,110 160,70 260,40 360,70 460,100" fill="none" stroke="#64748b" stroke-width="3"/>
  
  <!-- Points -->
  <circle cx="160" cy="70" r="5" fill="#22c55e"/>
  <circle cx="260" cy="40" r="6" fill="#eab308"/>
  <circle cx="360" cy="70" r="5" fill="#f43f5e"/>

  <!-- Labels -->
  <text x="160" y="55" font-size="11" fill="#166534" text-anchor="middle">mid</text>
  <text x="160" y="92" font-size="10" fill="#166534" text-anchor="middle">arr[mid] &lt; arr[mid+1]</text>
  <text x="160" y="105" font-size="10" fill="#166534" text-anchor="middle">→ uphill → left = mid + 1</text>

  <text x="260" y="28" font-size="11" fill="#854d0e" text-anchor="middle">peak</text>

  <text x="370" y="55" font-size="11" fill="#9f1239" text-anchor="middle">mid</text>
  <text x="370" y="92" font-size="10" fill="#9f1239" text-anchor="middle">arr[mid] &gt;= arr[mid+1]</text>
  <text x="370" y="105" font-size="10" fill="#9f1239" text-anchor="middle">→ peak or down → right = mid</text>

  <!-- Arrows -->
  <text x="210" y="130" font-size="12" fill="#166534">go right</text>
  <text x="320" y="130" font-size="12" fill="#9f1239">keep mid</text>
</svg>