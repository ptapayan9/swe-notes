<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Binary search discards the left half</title>
  <desc id="desc">A midpoint value below the target lets binary search discard the left half and move left to mid plus one.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .value { font: 500 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .cell { fill: #fbf8ea; stroke: #b8b8aa; stroke-width: 1.5; }
      .discard { fill: #fee2e2; stroke: #fca5a5; stroke-width: 1.5; }
      .keep { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; }
      .line { stroke: #e5e7eb; stroke-width: 2; }
      .arrow { stroke: #8b5cf6; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .left { fill: #0ea5e9; }
      .mid { fill: #d63384; }
      .right { fill: #ef3b2d; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">Discard The Half That Cannot Work</text>
  <line class="line" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">Target is</text>
  <text class="mono" x="172" y="162">8</text>
  <text class="body" x="193" y="162">. The middle value is</text>
  <text class="mono" x="446" y="162">6</text>
  <text class="body" x="467" y="162">, so every value at or left of mid is too small.</text>
  <text class="body" x="64" y="209">Move</text>
  <text class="mono" x="130" y="209">left = mid + 1</text>
  <text class="body" x="339" y="209">and keep searching the right side.</text>

  <g transform="translate(210 306)">
    <rect class="discard" x="0" y="0" width="110" height="74"/>
    <rect class="discard" x="110" y="0" width="110" height="74"/>
    <rect class="discard" x="220" y="0" width="110" height="74"/>
    <rect class="keep" x="330" y="0" width="110" height="74"/>
    <rect class="keep" x="440" y="0" width="110" height="74"/>
    <rect class="keep" x="550" y="0" width="110" height="74"/>
    <rect class="keep" x="660" y="0" width="110" height="74"/>

    <text class="value" x="55" y="46" text-anchor="middle">1</text>
    <text class="value" x="165" y="46" text-anchor="middle">3</text>
    <text class="value" x="275" y="46" text-anchor="middle">5</text>
    <text class="value" x="385" y="46" text-anchor="middle">7</text>
    <text class="value" x="495" y="46" text-anchor="middle">9</text>
    <text class="value" x="605" y="46" text-anchor="middle">11</text>
    <text class="value" x="715" y="46" text-anchor="middle">13</text>

    <text class="tiny" x="55" y="104" text-anchor="middle">0</text>
    <text class="tiny" x="165" y="104" text-anchor="middle">1</text>
    <text class="tiny" x="275" y="104" text-anchor="middle">2</text>
    <text class="tiny" x="385" y="104" text-anchor="middle">3</text>
    <text class="tiny" x="495" y="104" text-anchor="middle">4</text>
    <text class="tiny" x="605" y="104" text-anchor="middle">5</text>
    <text class="tiny" x="715" y="104" text-anchor="middle">6</text>

    <polygon class="mid" points="275,-70 303,-22 247,-22"/>
    <text class="small" x="275" y="-37" text-anchor="middle" fill="#ffffff">M</text>

    <polygon class="left" points="385,145 357,193 413,193"/>
    <text class="small" x="385" y="179" text-anchor="middle" fill="#ffffff">L</text>

    <polygon class="right" points="715,-70 743,-22 687,-22"/>
    <text class="small" x="715" y="-37" text-anchor="middle" fill="#ffffff">R</text>
  </g>

  <path class="arrow" d="M 486 503 C 515 535, 563 536, 595 503" marker-end="url(#arrowhead)"/>
  <text class="small" x="254" y="456">discarded: values &lt;= 5</text>
  <text class="small" x="645" y="475">remaining candidates</text>
  <text class="mono" x="392" y="566">nums[mid] &lt; target</text>
  <text class="body" x="649" y="566">means search right.</text>
</svg>
