<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">True midpoint records boundary and searches left</title>
  <desc id="desc">A binary search step where the midpoint is true, so the boundary index is recorded and right moves to mid minus one.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .value { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .keep { fill: #dbeafe; stroke: #93c5fd; stroke-width: 2; }
      .recorded { fill: #fce7f3; stroke: #f472b6; stroke-width: 3; }
      .discard { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .mid { fill: #d63384; }
      .left { fill: #0ea5e9; }
      .right { fill: #ef3b2d; }
      .answer { fill: #8b5cf6; }
      .arrow { stroke: #8b5cf6; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">If Mid Is True, Record It And Search Left</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">A true middle value is a candidate answer, but it may not be the first true.</text>
  <text class="body" x="64" y="209">Record it, then search left with</text>
  <text class="mono" x="401" y="209">right = mid - 1</text>
  <text class="body" x="620" y="209">.</text>

  <g transform="translate(285 335)">
    <rect class="keep" x="0" y="0" width="125" height="78"/>
    <rect class="keep" x="125" y="0" width="125" height="78"/>
    <rect class="recorded" x="250" y="0" width="125" height="78"/>
    <rect class="discard" x="375" y="0" width="125" height="78"/>
    <rect class="discard" x="500" y="0" width="125" height="78"/>

    <text class="value" x="62.5" y="48" text-anchor="middle" fill="#b91c1c">False</text>
    <text class="value" x="187.5" y="48" text-anchor="middle" fill="#b91c1c">False</text>
    <text class="value" x="312.5" y="48" text-anchor="middle" fill="#15803d">True</text>
    <text class="value" x="437.5" y="48" text-anchor="middle" fill="#15803d">True</text>
    <text class="value" x="562.5" y="48" text-anchor="middle" fill="#15803d">True</text>

    <text class="tiny" x="62.5" y="108" text-anchor="middle">0</text>
    <text class="tiny" x="187.5" y="108" text-anchor="middle">1</text>
    <text class="tiny" x="312.5" y="108" text-anchor="middle">2</text>
    <text class="tiny" x="437.5" y="108" text-anchor="middle">3</text>
    <text class="tiny" x="562.5" y="108" text-anchor="middle">4</text>

    <polygon class="mid" points="312.5,-76 343,-24 282,-24"/>
    <text class="small" x="312.5" y="-42" text-anchor="middle" fill="#ffffff">M</text>
    <polygon class="left" points="62.5,145 32,197 93,197"/>
    <text class="small" x="62.5" y="180" text-anchor="middle" fill="#ffffff">L</text>
    <polygon class="right" points="187.5,-76 218,-24 157,-24"/>
    <text class="small" x="187.5" y="-42" text-anchor="middle" fill="#ffffff">R</text>
    <polygon class="answer" points="312.5,145 282,197 343,197"/>
    <text class="small" x="312.5" y="180" text-anchor="middle" fill="#ffffff">A</text>
  </g>

  <path class="arrow" d="M 642 518 C 610 552, 552 552, 518 518" marker-end="url(#arrowhead)"/>
  <text class="small" x="64" y="292">mid = 2, arr[mid] = True</text>
  <text class="mono" x="333" y="576">boundary_index = 2, right moves to 1</text>
</svg>
