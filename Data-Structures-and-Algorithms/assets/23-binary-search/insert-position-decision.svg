<svg xmlns="http://www.w3.org/2000/svg" width="680" height="200" viewBox="0 0 680 200" font-family="system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="680" height="200" fill="#f8fafc"/>

  <text x="340" y="22" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Insert Position: The Two Cases at mid</text>

  <!-- Left case: too small -->
  <rect x="25" y="38" width="300" height="140" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="175" y="60" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">nums[mid] &lt; target</text>

  <g font-size="12" fill="#7f1d1d">
    <text x="45" y="85">Example: mid=1, value=4</text>
    <text x="45" y="103">target = 5</text>
    <text x="45" y="125" font-weight="600">→ mid is too small</text>
    <text x="45" y="142" font-weight="600">→ Answer is to the RIGHT</text>
  </g>

  <text x="175" y="168" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">left = mid + 1</text>

  <!-- Right case: big enough -->
  <rect x="355" y="38" width="300" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="505" y="60" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">nums[mid] &gt;= target</text>

  <g font-size="12" fill="#1e3a8a">
    <text x="375" y="85">Example: mid=2, value=6</text>
    <text x="375" y="103">target = 5</text>
    <text x="375" y="125" font-weight="600">→ mid is big enough</text>
    <text x="375" y="142" font-weight="600">→ Answer is mid or LEFT</text>
  </g>

  <text x="505" y="168" font-size="14" font-weight="700" fill="#1d4ed8" text-anchor="middle">right = mid   ✓</text>

  <!-- Warning -->
  <text x="340" y="192" font-size="10" fill="#64748b" text-anchor="middle">Never use right = mid - 1 here — you would discard a possible correct answer</text>
</svg>