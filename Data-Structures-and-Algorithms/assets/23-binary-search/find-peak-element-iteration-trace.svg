<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Find Peak Element binary search iteration trace</title>
  <desc id="desc">Three iterations showing how comparing nums[mid] with nums[mid plus one] moves the search range toward a peak.</desc>
  <style>
    .bg { fill: #ffffff; }
    .title { font: 700 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .subtitle { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .label { font: 700 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    .small { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .value { font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .index { font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .box-faded { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; opacity: 0.45; }
    .mid { fill: #fde68a; stroke: #d97706; stroke-width: 2; rx: 8; }
    .next { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .peak { fill: #bbf7d0; stroke: #16a34a; stroke-width: 2; rx: 8; }
    .callout { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
    .up { fill: #ecfdf5; stroke: #22c55e; stroke-width: 1.5; rx: 10; }
    .down { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 10; }
    .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" width="980" height="520" />
  <text class="title" x="40" y="44">Find Peak Element: read the slope</text>
  <text class="subtitle" x="40" y="72">Example: nums = [1, 2, 1, 3, 5, 6, 4]. Return any peak index; here the search converges to index 5.</text>

  <g transform="translate(40 105)">
    <text class="label" x="0" y="-12">Iteration 1</text>
    <text class="small" x="120" y="-12">left = 0, right = 6, mid = 3</text>
    <g>
      <rect class="box" x="0" y="0" width="62" height="48" />
      <text class="value" x="31" y="30" text-anchor="middle">1</text>
      <text class="index" x="31" y="66" text-anchor="middle">0 L</text>
      <rect class="box" x="70" y="0" width="62" height="48" />
      <text class="value" x="101" y="30" text-anchor="middle">2</text>
      <text class="index" x="101" y="66" text-anchor="middle">1</text>
      <rect class="box" x="140" y="0" width="62" height="48" />
      <text class="value" x="171" y="30" text-anchor="middle">1</text>
      <text class="index" x="171" y="66" text-anchor="middle">2</text>
      <rect class="mid" x="210" y="0" width="62" height="48" />
      <text class="value" x="241" y="30" text-anchor="middle">3</text>
      <text class="index" x="241" y="66" text-anchor="middle">3 M</text>
      <rect class="next" x="280" y="0" width="62" height="48" />
      <text class="value" x="311" y="30" text-anchor="middle">5</text>
      <text class="index" x="311" y="66" text-anchor="middle">4 M+1</text>
      <rect class="box" x="350" y="0" width="62" height="48" />
      <text class="value" x="381" y="30" text-anchor="middle">6</text>
      <text class="index" x="381" y="66" text-anchor="middle">5</text>
      <rect class="box" x="420" y="0" width="62" height="48" />
      <text class="value" x="451" y="30" text-anchor="middle">4</text>
      <text class="index" x="451" y="66" text-anchor="middle">6 R</text>
    </g>
    <rect class="up" x="540" y="-2" width="355" height="74" />
    <text class="label" x="560" y="24">nums[mid] &lt; nums[mid + 1]</text>
    <text class="small" x="560" y="49">3 &lt; 5, so slope is going up.</text>
    <text class="small" x="560" y="68">Move left = mid + 1.</text>
    <path class="arrow" d="M500,24 C518,24 520,24 535,24" />
  </g>

  <g transform="translate(40 255)">
    <text class="label" x="0" y="-12">Iteration 2</text>
    <text class="small" x="120" y="-12">left = 4, right = 6, mid = 5</text>
    <g>
      <rect class="box-faded" x="0" y="0" width="62" height="48" />
      <text class="value" x="31" y="30" text-anchor="middle">1</text>
      <text class="index" x="31" y="66" text-anchor="middle">0</text>
      <rect class="box-faded" x="70" y="0" width="62" height="48" />
      <text class="value" x="101" y="30" text-anchor="middle">2</text>
      <text class="index" x="101" y="66" text-anchor="middle">1</text>
      <rect class="box-faded" x="140" y="0" width="62" height="48" />
      <text class="value" x="171" y="30" text-anchor="middle">1</text>
      <text class="index" x="171" y="66" text-anchor="middle">2</text>
      <rect class="box-faded" x="210" y="0" width="62" height="48" />
      <text class="value" x="241" y="30" text-anchor="middle">3</text>
      <text class="index" x="241" y="66" text-anchor="middle">3</text>
      <rect class="box" x="280" y="0" width="62" height="48" />
      <text class="value" x="311" y="30" text-anchor="middle">5</text>
      <text class="index" x="311" y="66" text-anchor="middle">4 L</text>
      <rect class="mid" x="350" y="0" width="62" height="48" />
      <text class="value" x="381" y="30" text-anchor="middle">6</text>
      <text class="index" x="381" y="66" text-anchor="middle">5 M</text>
      <rect class="next" x="420" y="0" width="62" height="48" />
      <text class="value" x="451" y="30" text-anchor="middle">4</text>
      <text class="index" x="451" y="66" text-anchor="middle">6 M+1/R</text>
    </g>
    <rect class="down" x="540" y="-2" width="355" height="74" />
    <text class="label" x="560" y="24">nums[mid] &lt; nums[mid + 1] is false</text>
    <text class="small" x="560" y="49">6 &lt; 4 is false, so slope goes down.</text>
    <text class="small" x="560" y="68">Keep mid: right = mid.</text>
    <path class="arrow" d="M500,24 C518,24 520,24 535,24" />
  </g>

  <g transform="translate(40 405)">
    <text class="label" x="0" y="-12">Iteration 3 and result</text>
    <text class="small" x="170" y="-12">left = 4, right = 5, mid = 4, then left becomes 5</text>
    <g>
      <rect class="box-faded" x="0" y="0" width="62" height="48" />
      <text class="value" x="31" y="30" text-anchor="middle">1</text>
      <text class="index" x="31" y="66" text-anchor="middle">0</text>
      <rect class="box-faded" x="70" y="0" width="62" height="48" />
      <text class="value" x="101" y="30" text-anchor="middle">2</text>
      <text class="index" x="101" y="66" text-anchor="middle">1</text>
      <rect class="box-faded" x="140" y="0" width="62" height="48" />
      <text class="value" x="171" y="30" text-anchor="middle">1</text>
      <text class="index" x="171" y="66" text-anchor="middle">2</text>
      <rect class="box-faded" x="210" y="0" width="62" height="48" />
      <text class="value" x="241" y="30" text-anchor="middle">3</text>
      <text class="index" x="241" y="66" text-anchor="middle">3</text>
      <rect class="mid" x="280" y="0" width="62" height="48" />
      <text class="value" x="311" y="30" text-anchor="middle">5</text>
      <text class="index" x="311" y="66" text-anchor="middle">4 M/L</text>
      <rect class="peak" x="350" y="0" width="62" height="48" />
      <text class="value" x="381" y="30" text-anchor="middle">6</text>
      <text class="index" x="381" y="66" text-anchor="middle">5 peak</text>
      <rect class="box-faded" x="420" y="0" width="62" height="48" />
      <text class="value" x="451" y="30" text-anchor="middle">4</text>
      <text class="index" x="451" y="66" text-anchor="middle">6</text>
    </g>
    <rect class="callout" x="540" y="-2" width="355" height="74" />
    <text class="label" x="560" y="24">When left == right, stop.</text>
    <text class="small" x="560" y="49">Index 5 is a peak because 6 is greater</text>
    <text class="small" x="560" y="68">than both neighbors: 5 and 4.</text>
    <path class="arrow" d="M500,24 C518,24 520,24 535,24" />
  </g>
</svg>
