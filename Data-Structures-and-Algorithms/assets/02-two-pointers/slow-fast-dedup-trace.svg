<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Slow and fast trace for remove duplicates</title>
  <desc id="desc">A visual trace of the slow and fast pointers for removing duplicates from the sorted array 1, 1, 2, 2, 3.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #4b5563; }
      .rowLabel { font-size: 20px; font-weight: 700; }
      .small { font-size: 16px; fill: #4b5563; }
      .note { font-size: 18px; font-weight: 600; fill: #075985; }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 22px;
        fill: #111827;
      }
      .kept { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.5; }
      .scan { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2.5; }
      .stale { fill: #f8fafc; stroke: #d1d5db; stroke-width: 2; }
      .slow { fill: #15803d; }
      .fast { fill: #b45309; }
      .brace { stroke: #16a34a; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .divider { stroke: #e5e7eb; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1120" height="720" fill="#ffffff"/>
  <text x="560" y="46" class="title" text-anchor="middle">Remove Duplicates: slow = last kept index</text>
  <text x="560" y="76" class="subtitle" text-anchor="middle">Return slow + 1 because the valid prefix includes index 0</text>

  <text x="70" y="124" class="rowLabel">Start</text>
  <text x="70" y="150" class="small">slow = 0</text>
  <rect x="235" y="105" width="72" height="54" rx="8" class="kept"/>
  <rect x="320" y="105" width="72" height="54" rx="8" class="stale"/>
  <rect x="405" y="105" width="72" height="54" rx="8" class="stale"/>
  <rect x="490" y="105" width="72" height="54" rx="8" class="stale"/>
  <rect x="575" y="105" width="72" height="54" rx="8" class="stale"/>
  <text x="271" y="140" class="mono" text-anchor="middle">1</text>
  <text x="356" y="140" class="mono" text-anchor="middle">1</text>
  <text x="441" y="140" class="mono" text-anchor="middle">2</text>
  <text x="526" y="140" class="mono" text-anchor="middle">2</text>
  <text x="611" y="140" class="mono" text-anchor="middle">3</text>
  <path d="M271 170 L259 190 H283 Z" class="slow"/>
  <text x="271" y="214" class="small slow" text-anchor="middle">slow</text>
  <text x="730" y="130" class="note">First value is automatically kept.</text>
  <path d="M235 232 H307 M235 224 V240 M307 224 V240" class="brace"/>
  <text x="271" y="262" class="small slow" text-anchor="middle">valid prefix length = 1</text>

  <line x1="70" y1="292" x2="1050" y2="292" class="divider"/>

  <text x="70" y="344" class="rowLabel">fast finds 2</text>
  <text x="70" y="370" class="small">2 is new</text>
  <rect x="235" y="325" width="72" height="54" rx="8" class="kept"/>
  <rect x="320" y="325" width="72" height="54" rx="8" class="kept"/>
  <rect x="405" y="325" width="72" height="54" rx="8" class="scan"/>
  <rect x="490" y="325" width="72" height="54" rx="8" class="stale"/>
  <rect x="575" y="325" width="72" height="54" rx="8" class="stale"/>
  <text x="271" y="360" class="mono" text-anchor="middle">1</text>
  <text x="356" y="360" class="mono" text-anchor="middle">2</text>
  <text x="441" y="360" class="mono" text-anchor="middle">2</text>
  <text x="526" y="360" class="mono" text-anchor="middle">2</text>
  <text x="611" y="360" class="mono" text-anchor="middle">3</text>
  <path d="M356 390 L344 410 H368 Z" class="slow"/>
  <text x="356" y="434" class="small slow" text-anchor="middle">slow</text>
  <path d="M441 313 L429 293 H453 Z" class="fast"/>
  <text x="441" y="286" class="small fast" text-anchor="middle">fast</text>
  <text x="730" y="342" class="note">slow += 1, then nums[slow] = nums[fast]</text>
  <text x="730" y="372" class="small">The front becomes [1, 2].</text>
  <path d="M235 452 H392 M235 444 V460 M392 444 V460" class="brace"/>
  <text x="314" y="482" class="small slow" text-anchor="middle">valid prefix length = 2</text>

  <line x1="70" y1="512" x2="1050" y2="512" class="divider"/>

  <text x="70" y="564" class="rowLabel">fast finds 3</text>
  <text x="70" y="590" class="small">3 is new</text>
  <rect x="235" y="545" width="72" height="54" rx="8" class="kept"/>
  <rect x="320" y="545" width="72" height="54" rx="8" class="kept"/>
  <rect x="405" y="545" width="72" height="54" rx="8" class="kept"/>
  <rect x="490" y="545" width="72" height="54" rx="8" class="stale"/>
  <rect x="575" y="545" width="72" height="54" rx="8" class="scan"/>
  <text x="271" y="580" class="mono" text-anchor="middle">1</text>
  <text x="356" y="580" class="mono" text-anchor="middle">2</text>
  <text x="441" y="580" class="mono" text-anchor="middle">3</text>
  <text x="526" y="580" class="mono" text-anchor="middle">2</text>
  <text x="611" y="580" class="mono" text-anchor="middle">3</text>
  <path d="M441 610 L429 630 H453 Z" class="slow"/>
  <text x="441" y="654" class="small slow" text-anchor="middle">slow</text>
  <path d="M611 533 L599 513 H623 Z" class="fast"/>
  <text x="611" y="506" class="small fast" text-anchor="middle">fast</text>
  <text x="730" y="562" class="note">Return slow + 1 = 3</text>
  <text x="730" y="592" class="small">Only nums[:3] matters: [1, 2, 3].</text>
  <path d="M235 672 H477 M235 664 V680 M477 664 V680" class="brace"/>
  <text x="356" y="702" class="small slow" text-anchor="middle">valid prefix length = 3</text>
</svg>
