<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Two-pointer family map</title>
  <desc id="desc">A compact map of two-pointer patterns: opposite ends, writer reader, and nearby relatives.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 34px; font-weight: 700; }
      .heading { font-size: 24px; font-weight: 700; }
      .body { font-size: 20px; }
      .small { font-size: 18px; fill: #4b5563; }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 18px;
        fill: #be185d;
      }
      .blue-text { fill: #075985; }
      .green-text { fill: #166534; }
      .purple-text { fill: #6d28d9; }
      .orange-text { fill: #9a3412; }
    </style>
  </defs>

  <rect width="1120" height="560" fill="#ffffff"/>

  <text x="560" y="52" class="title" text-anchor="middle">Two-Pointer Family Map</text>

  <rect x="430" y="82" width="260" height="58" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="560" y="119" class="heading blue-text" text-anchor="middle">Two Pointers</text>

  <line x1="505" y1="140" x2="285" y2="182" stroke="#9ca3af" stroke-width="2"/>
  <line x1="615" y1="140" x2="835" y2="182" stroke="#9ca3af" stroke-width="2"/>

  <rect x="90" y="182" width="390" height="72" rx="8" fill="#eff6ff" stroke="#38bdf8" stroke-width="2"/>
  <text x="285" y="213" class="heading blue-text" text-anchor="middle">Opposite Ends</text>
  <text x="285" y="239" class="small" text-anchor="middle">move inward from both sides</text>

  <rect x="640" y="182" width="390" height="72" rx="8" fill="#ecfdf5" stroke="#4ade80" stroke-width="2"/>
  <text x="835" y="211" class="heading green-text" text-anchor="middle">
    <tspan x="835" dy="0">Same Direction</tspan>
    <tspan x="835" dy="25">(writer / reader)</tspan>
  </text>

  <line x1="170" y1="254" x2="170" y2="300" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="285" y1="254" x2="285" y2="388" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="400" y1="254" x2="400" y2="300" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 4"/>

  <rect x="65" y="300" width="210" height="70" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="170" y="329" class="body" text-anchor="middle">Pair Sum</text>
  <text x="170" y="354" class="mono" text-anchor="middle">Two Sum II</text>

  <rect x="282" y="300" width="210" height="70" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="387" y="329" class="body" text-anchor="middle">Max Area</text>
  <text x="387" y="354" class="mono" text-anchor="middle">container</text>

  <rect x="173" y="388" width="224" height="70" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="285" y="417" class="body" text-anchor="middle">Symmetry</text>
  <text x="285" y="442" class="mono" text-anchor="middle">palindrome</text>

  <line x1="765" y1="254" x2="765" y2="300" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="905" y1="254" x2="905" y2="300" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5 4"/>

  <rect x="645" y="300" width="240" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="765" y="329" class="body" text-anchor="middle">Deduplicate</text>
  <text x="765" y="354" class="mono" text-anchor="middle">clean prefix</text>

  <rect x="895" y="300" width="200" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="995" y="329" class="body" text-anchor="middle">Partition</text>
  <text x="995" y="354" class="mono" text-anchor="middle">move zeroes</text>

  <rect x="120" y="480" width="330" height="54" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="285" y="503" class="body purple-text" text-anchor="middle" font-weight="700">Fast / Slow</text>
  <text x="285" y="524" class="small" text-anchor="middle">different speeds over one structure</text>

  <rect x="670" y="480" width="330" height="54" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="835" y="503" class="body orange-text" text-anchor="middle" font-weight="700">Sliding Window</text>
  <text x="835" y="524" class="small" text-anchor="middle">two bounds around a constraint</text>
</svg>
