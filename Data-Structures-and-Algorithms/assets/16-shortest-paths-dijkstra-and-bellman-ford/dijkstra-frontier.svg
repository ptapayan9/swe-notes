<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">Dijkstra mid-run: settled set, frontier, unreached</title>
  <desc id="desc">Graph snapshot after Dijkstra pops A and C from source A. A and C are settled in green with final distances 0 and 1. B and D are frontier nodes in blue with tentative distances 3 and 9. E is unreached at infinity. The heap below holds (3,B), a stale (4,B), and (9,D).</desc>
  <rect width="1200" height="660" fill="#ffffff"/>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .nl { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .w { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .edge { stroke: #6b7280; stroke-width: 2.5; fill: none; }
    .settled { fill: #dcfce7; stroke: #86efac; stroke-width: 3; }
    .frontier { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
    .unreached { fill: #ffffff; stroke: #e5e7eb; stroke-width: 3; }
    .stale { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .heapcell { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text class="t" x="40" y="56">Dijkstra mid-run: settled, frontier, unreached</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#e5e7eb" stroke-width="2"/>

  <!-- edges -->
  <line class="edge" x1="205" y1="230" x2="445" y2="160" marker-end="url(#arr)"/>
  <text class="w" x="305" y="178">4</text>
  <line class="edge" x1="204" y1="251" x2="446" y2="329" marker-end="url(#arr)"/>
  <text class="w" x="305" y="318">1</text>
  <line class="edge" x1="480" y1="302" x2="480" y2="188" marker-end="url(#arr)"/>
  <text class="w" x="496" y="252">2</text>
  <line class="edge" x1="515" y1="160" x2="755" y2="230" marker-end="url(#arr)"/>
  <text class="w" x="640" y="178">5</text>
  <line class="edge" x1="514" y1="329" x2="756" y2="251" marker-end="url(#arr)"/>
  <text class="w" x="640" y="320">8</text>
  <line class="edge" x1="826" y1="240" x2="1012" y2="240" marker-end="url(#arr)"/>
  <text class="w" x="910" y="226">3</text>
  <path class="edge" d="M 514 138 Q 770 56 1020 216" marker-end="url(#arr)"/>
  <text class="w" x="756" y="92">10</text>

  <!-- nodes -->
  <circle class="settled" cx="170" cy="240" r="36"/>
  <text class="nl" x="170" y="250" text-anchor="middle">A</text>
  <text class="s" x="170" y="304" text-anchor="middle">dist 0 — final</text>

  <circle class="frontier" cx="480" cy="150" r="36"/>
  <text class="nl" x="480" y="160" text-anchor="middle">B</text>
  <text class="s" x="438" y="120" text-anchor="end">dist 3 — tentative</text>

  <circle class="settled" cx="480" cy="340" r="36"/>
  <text class="nl" x="480" y="350" text-anchor="middle">C</text>
  <text class="s" x="480" y="404" text-anchor="middle">dist 1 — final</text>

  <circle class="frontier" cx="790" cy="240" r="36"/>
  <text class="nl" x="790" y="250" text-anchor="middle">D</text>
  <text class="s" x="790" y="304" text-anchor="middle">dist 9 — tentative</text>

  <circle class="unreached" cx="1050" cy="240" r="36"/>
  <text class="nl" x="1050" y="250" text-anchor="middle">E</text>
  <text class="s" x="1050" y="304" text-anchor="middle">dist ∞ — unreached</text>

  <!-- legend -->
  <rect class="settled" x="60" y="436" width="28" height="28" rx="6"/>
  <text class="b" x="100" y="458">settled — distance is final</text>
  <rect class="frontier" x="450" y="436" width="28" height="28" rx="6"/>
  <text class="b" x="490" y="458">frontier — best tentative so far</text>
  <rect class="unreached" x="880" y="436" width="28" height="28" rx="6"/>
  <text class="b" x="920" y="458">unreached — ∞</text>

  <!-- heap strip -->
  <text class="b" x="60" y="540">Heap contents at this moment:</text>
  <rect class="heapcell" x="60" y="558" width="160" height="52" rx="8"/>
  <text class="c" x="140" y="592" text-anchor="middle">(3, B)</text>
  <rect class="stale" x="240" y="558" width="160" height="52" rx="8"/>
  <text class="c" x="320" y="592" text-anchor="middle">(4, B)</text>
  <rect class="heapcell" x="420" y="558" width="160" height="52" rx="8"/>
  <text class="c" x="500" y="592" text-anchor="middle">(9, D)</text>
  <text class="m" x="620" y="592">(4, B) is stale — B improved to 3 via C; it is skipped at pop time</text>
  <text class="s" x="320" y="634" text-anchor="middle">stale duplicate</text>
</svg>
