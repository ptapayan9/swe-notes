<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">fib(5) naive call tree — repeated work explodes</title>
  <desc id="desc">A binary tree of fifteen calls computing fib(5). Blue nodes are subproblems computed for the first time, red nodes are repeated subproblems such as fib(3) computed twice and fib(2) computed three times, and green nodes are base cases fib(1) and fib(0). A caption notes that fib(40) makes about 331 million calls.</desc>
  <rect width="1200" height="660" fill="#ffffff"/>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .node  { font: 700 22px "SFMono-Regular", Consolas, monospace; fill: #111827; }
  </style>

  <text class="title" x="40" y="56">fib(5) naive call tree — repeated work explodes</text>
  <line x1="40" y1="74" x2="1160" y2="74" stroke="#e5e7eb" stroke-width="2"/>

  <!-- edges -->
  <g stroke="#6b7280" stroke-width="2">
    <line x1="600" y1="154" x2="340" y2="205"/>
    <line x1="600" y1="154" x2="880" y2="205"/>
    <line x1="340" y1="249" x2="200" y2="300"/>
    <line x1="340" y1="249" x2="480" y2="300"/>
    <line x1="880" y1="249" x2="760" y2="300"/>
    <line x1="880" y1="249" x2="1000" y2="300"/>
    <line x1="200" y1="344" x2="120" y2="395"/>
    <line x1="200" y1="344" x2="280" y2="395"/>
    <line x1="480" y1="344" x2="420" y2="395"/>
    <line x1="480" y1="344" x2="545" y2="395"/>
    <line x1="760" y1="344" x2="700" y2="395"/>
    <line x1="760" y1="344" x2="825" y2="395"/>
    <line x1="120" y1="439" x2="65" y2="490"/>
    <line x1="120" y1="439" x2="190" y2="490"/>
  </g>

  <!-- level 0 -->
  <rect x="545" y="110" width="110" height="44" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="node" x="600" y="140" text-anchor="middle">fib(5)</text>

  <!-- level 1 -->
  <rect x="285" y="205" width="110" height="44" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="node" x="340" y="235" text-anchor="middle">fib(4)</text>
  <rect x="825" y="205" width="110" height="44" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="node" x="880" y="235" text-anchor="middle">fib(3)</text>

  <!-- level 2 -->
  <rect x="145" y="300" width="110" height="44" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="node" x="200" y="330" text-anchor="middle">fib(3)</text>
  <rect x="425" y="300" width="110" height="44" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="node" x="480" y="330" text-anchor="middle">fib(2)</text>
  <rect x="705" y="300" width="110" height="44" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="node" x="760" y="330" text-anchor="middle">fib(2)</text>
  <rect x="945" y="300" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="1000" y="330" text-anchor="middle">fib(1)</text>

  <!-- level 3 -->
  <rect x="65" y="395" width="110" height="44" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="node" x="120" y="425" text-anchor="middle">fib(2)</text>
  <rect x="225" y="395" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="280" y="425" text-anchor="middle">fib(1)</text>
  <rect x="365" y="395" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="420" y="425" text-anchor="middle">fib(1)</text>
  <rect x="490" y="395" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="545" y="425" text-anchor="middle">fib(0)</text>
  <rect x="645" y="395" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="700" y="425" text-anchor="middle">fib(1)</text>
  <rect x="770" y="395" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="825" y="425" text-anchor="middle">fib(0)</text>

  <!-- level 4 -->
  <rect x="10" y="490" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="65" y="520" text-anchor="middle">fib(1)</text>
  <rect x="135" y="490" width="110" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="node" x="190" y="520" text-anchor="middle">fib(0)</text>

  <!-- legend -->
  <rect x="80" y="572" width="26" height="26" rx="4" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="small" x="116" y="591">computed for the first time</text>
  <rect x="420" y="572" width="26" height="26" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="small" x="456" y="591">repeated subproblem (wasted work)</text>
  <rect x="810" y="572" width="26" height="26" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="small" x="846" y="591">base case</text>

  <text class="muted" x="80" y="638">fib(5) makes 15 calls; fib(40) makes ≈ 331,160,281 — calls grow like φⁿ ≈ 1.618ⁿ.</text>
</svg>
