<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Degenerate chain versus balanced BST</title>
  <desc id="desc">The same five keys inserted in sorted order form a right-leaning chain of height five, while a balanced shape holds them at height three.</desc>
  <rect x="0" y="0" width="1200" height="640" fill="#ffffff"/>
  <style>
    .t    { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s    { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c    { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .key  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; }
    .edge { stroke: #6b7280; stroke-width: 2.5; }
    .bad  { fill: #fee2e2; stroke: #fca5a5; stroke-width: 3; }
    .good { fill: #dcfce7; stroke: #86efac; stroke-width: 3; }
  </style>

  <text class="t" x="40" y="56">Same keys, two shapes: height drives every cost</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="610" y1="100" x2="610" y2="600" stroke="#e5e7eb" stroke-width="2"/>

  <!-- left: degenerate chain -->
  <text class="s" x="60" y="120">INSERT 10, 20, 30, 40, 50 — SORTED INPUT</text>

  <line class="edge" x1="170" y1="180" x2="245" y2="265"/>
  <line class="edge" x1="245" y1="265" x2="320" y2="350"/>
  <line class="edge" x1="320" y1="350" x2="395" y2="435"/>
  <line class="edge" x1="395" y1="435" x2="470" y2="520"/>

  <circle class="bad" cx="170" cy="180" r="30"/>
  <circle class="bad" cx="245" cy="265" r="30"/>
  <circle class="bad" cx="320" cy="350" r="30"/>
  <circle class="bad" cx="395" cy="435" r="30"/>
  <circle class="bad" cx="470" cy="520" r="30"/>

  <text class="key" x="170" y="189" text-anchor="middle">10</text>
  <text class="key" x="245" y="274" text-anchor="middle">20</text>
  <text class="key" x="320" y="359" text-anchor="middle">30</text>
  <text class="key" x="395" y="444" text-anchor="middle">40</text>
  <text class="key" x="470" y="529" text-anchor="middle">50</text>

  <text class="s" x="80" y="186" text-anchor="middle">d = 1</text>
  <text class="s" x="155" y="271" text-anchor="middle">d = 2</text>
  <text class="s" x="230" y="356" text-anchor="middle">d = 3</text>
  <text class="s" x="305" y="441" text-anchor="middle">d = 4</text>
  <text class="s" x="380" y="526" text-anchor="middle">d = 5</text>

  <text class="m" x="60" y="592">Every new key goes right:  h = n = 5,  search is O(n)</text>

  <!-- right: balanced shape -->
  <text class="s" x="650" y="120">SAME KEYS — BALANCED SHAPE</text>

  <line class="edge" x1="880" y1="200" x2="770" y2="310"/>
  <line class="edge" x1="880" y1="200" x2="990" y2="310"/>
  <line class="edge" x1="770" y1="310" x2="700" y2="420"/>
  <line class="edge" x1="990" y1="310" x2="1060" y2="420"/>

  <circle class="good" cx="880" cy="200" r="30"/>
  <circle class="good" cx="770" cy="310" r="30"/>
  <circle class="good" cx="990" cy="310" r="30"/>
  <circle class="good" cx="700" cy="420" r="30"/>
  <circle class="good" cx="1060" cy="420" r="30"/>

  <text class="key" x="880" y="209" text-anchor="middle">30</text>
  <text class="key" x="770" y="319" text-anchor="middle">20</text>
  <text class="key" x="990" y="319" text-anchor="middle">40</text>
  <text class="key" x="700" y="429" text-anchor="middle">10</text>
  <text class="key" x="1060" y="429" text-anchor="middle">50</text>

  <text class="s" x="955" y="206" text-anchor="start">d = 1</text>
  <text class="s" x="845" y="316" text-anchor="end">d = 2</text>
  <text class="s" x="775" y="426" text-anchor="end">d = 3</text>

  <text class="m" x="650" y="592">h = ⌈log₂(n + 1)⌉ = 3,  search is O(log n)</text>
</svg>
