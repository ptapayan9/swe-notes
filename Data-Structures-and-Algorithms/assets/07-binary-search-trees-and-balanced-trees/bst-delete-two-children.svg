<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">BST delete with two children</title>
  <desc id="desc">Deleting key 40, which has two children: copy the inorder successor 50 into the node, then delete 50 from the right subtree.</desc>
  <rect x="0" y="0" width="1200" height="660" fill="#ffffff"/>
  <style>
    .t    { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m    { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s    { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c    { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .key  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; }
    .edge { stroke: #6b7280; stroke-width: 2.5; }
    .norm { fill: #ffffff; stroke: #6b7280; stroke-width: 3; }
    .bad  { fill: #fee2e2; stroke: #fca5a5; stroke-width: 3; }
    .good { fill: #dcfce7; stroke: #86efac; stroke-width: 3; }
    .hot  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <text class="t" x="40" y="56">Delete a node with two children: successor swap</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- BEFORE -->
  <text class="s" x="60" y="120">BEFORE — delete(40)</text>

  <line class="edge" x1="280" y1="200" x2="160" y2="320"/>
  <line class="edge" x1="280" y1="200" x2="400" y2="320"/>
  <line class="edge" x1="160" y1="320" x2="95"  y2="440"/>
  <line class="edge" x1="160" y1="320" x2="225" y2="440"/>
  <line class="edge" x1="400" y1="320" x2="335" y2="440"/>
  <line class="edge" x1="400" y1="320" x2="465" y2="440"/>

  <circle class="bad"  cx="280" cy="200" r="30"/>
  <circle class="norm" cx="160" cy="320" r="30"/>
  <circle class="norm" cx="400" cy="320" r="30"/>
  <circle class="norm" cx="95"  cy="440" r="30"/>
  <circle class="norm" cx="225" cy="440" r="30"/>
  <circle class="hot"  cx="335" cy="440" r="30"/>
  <circle class="norm" cx="465" cy="440" r="30"/>

  <text class="key" x="280" y="209" text-anchor="middle">40</text>
  <text class="key" x="160" y="329" text-anchor="middle">20</text>
  <text class="key" x="400" y="329" text-anchor="middle">60</text>
  <text class="key" x="95"  y="449" text-anchor="middle">10</text>
  <text class="key" x="225" y="449" text-anchor="middle">30</text>
  <text class="key" x="335" y="449" text-anchor="middle">50</text>
  <text class="key" x="465" y="449" text-anchor="middle">70</text>

  <text class="s" x="355" y="195">target</text>
  <text class="s" x="300" y="500" text-anchor="middle">successor = min(right)</text>

  <text class="b" x="60" y="550">1. successor = smallest key in the right subtree → 50</text>
  <text class="b" x="60" y="585">2. Copy 50 into the target node — no pointers move yet</text>
  <text class="b" x="60" y="620">3. Delete 50 from the right subtree (it has ≤ 1 child there)</text>

  <!-- transition arrow -->
  <line x1="545" y1="320" x2="645" y2="320" stroke="#0ea5e9" stroke-width="3.5" marker-end="url(#arr)"/>
  <text class="s" x="595" y="296" text-anchor="middle">copy key</text>

  <!-- AFTER -->
  <text class="s" x="700" y="120">AFTER</text>

  <line class="edge" x1="880"  y1="200" x2="760"  y2="320"/>
  <line class="edge" x1="880"  y1="200" x2="1000" y2="320"/>
  <line class="edge" x1="760"  y1="320" x2="695"  y2="440"/>
  <line class="edge" x1="760"  y1="320" x2="825"  y2="440"/>
  <line class="edge" x1="1000" y1="320" x2="1065" y2="440"/>

  <circle class="good" cx="880"  cy="200" r="30"/>
  <circle class="norm" cx="760"  cy="320" r="30"/>
  <circle class="norm" cx="1000" cy="320" r="30"/>
  <circle class="norm" cx="695"  cy="440" r="30"/>
  <circle class="norm" cx="825"  cy="440" r="30"/>
  <circle class="norm" cx="1065" cy="440" r="30"/>

  <text class="key" x="880"  y="209" text-anchor="middle">50</text>
  <text class="key" x="760"  y="329" text-anchor="middle">20</text>
  <text class="key" x="1000" y="329" text-anchor="middle">60</text>
  <text class="key" x="695"  y="449" text-anchor="middle">10</text>
  <text class="key" x="825"  y="449" text-anchor="middle">30</text>
  <text class="key" x="1065" y="449" text-anchor="middle">70</text>

  <text class="s" x="930" y="500" text-anchor="middle">60.left is now empty</text>

  <text class="m" x="700" y="585">Invariant holds: 50 is the smallest key of the old</text>
  <text class="m" x="700" y="620">right subtree, so left &lt; 50 &lt; right still works.</text>
</svg>
