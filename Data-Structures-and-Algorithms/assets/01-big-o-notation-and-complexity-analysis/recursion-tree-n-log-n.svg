<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Recursion tree for T(n) = 2T(n/2) + n</title>
  <desc id="desc">A binary recursion tree. The root costs n, the two children cost n/2 each, four grandchildren cost n/4 each, and so on. Every level sums to exactly n, and there are log base 2 of n levels, so the total work is n log n.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .c  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cs { font: 600 18px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .node { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .pill { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .edge { stroke: #6b7280; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
  <text class="t" x="60" y="52">Recursion tree: T(n) = 2T(n/2) + n</text>
  <line x1="60" y1="72" x2="1140" y2="72" stroke="#e5e7eb" stroke-width="2"/>
  <text class="s" x="860" y="108">cost per level</text>

  <!-- edges -->
  <line class="edge" x1="460" y1="168" x2="280" y2="220"/>
  <line class="edge" x1="460" y1="168" x2="640" y2="220"/>
  <line class="edge" x1="280" y1="268" x2="190" y2="320"/>
  <line class="edge" x1="280" y1="268" x2="370" y2="320"/>
  <line class="edge" x1="640" y1="268" x2="550" y2="320"/>
  <line class="edge" x1="640" y1="268" x2="730" y2="320"/>
  <line class="edge" x1="190" y1="368" x2="145" y2="420"/>
  <line class="edge" x1="190" y1="368" x2="235" y2="420"/>
  <line class="edge" x1="370" y1="368" x2="325" y2="420"/>
  <line class="edge" x1="370" y1="368" x2="415" y2="420"/>
  <line class="edge" x1="550" y1="368" x2="505" y2="420"/>
  <line class="edge" x1="550" y1="368" x2="595" y2="420"/>
  <line class="edge" x1="730" y1="368" x2="685" y2="420"/>
  <line class="edge" x1="730" y1="368" x2="775" y2="420"/>

  <!-- level 0 -->
  <rect class="node" x="400" y="120" width="120" height="48" rx="8"/>
  <text class="c" x="460" y="152" text-anchor="middle">n</text>
  <!-- level 1 -->
  <rect class="node" x="225" y="220" width="110" height="48" rx="8"/>
  <text class="c" x="280" y="252" text-anchor="middle">n/2</text>
  <rect class="node" x="585" y="220" width="110" height="48" rx="8"/>
  <text class="c" x="640" y="252" text-anchor="middle">n/2</text>
  <!-- level 2 -->
  <rect class="node" x="140" y="320" width="100" height="48" rx="8"/>
  <text class="c" x="190" y="352" text-anchor="middle">n/4</text>
  <rect class="node" x="320" y="320" width="100" height="48" rx="8"/>
  <text class="c" x="370" y="352" text-anchor="middle">n/4</text>
  <rect class="node" x="500" y="320" width="100" height="48" rx="8"/>
  <text class="c" x="550" y="352" text-anchor="middle">n/4</text>
  <rect class="node" x="680" y="320" width="100" height="48" rx="8"/>
  <text class="c" x="730" y="352" text-anchor="middle">n/4</text>
  <!-- level 3 -->
  <rect class="node" x="105" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="145" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="195" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="235" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="285" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="325" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="375" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="415" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="465" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="505" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="555" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="595" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="645" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="685" y="452" text-anchor="middle">n/8</text>
  <rect class="node" x="735" y="420" width="80" height="48" rx="8"/>
  <text class="c" x="775" y="452" text-anchor="middle">n/8</text>

  <!-- ellipsis -->
  <text class="m" x="460" y="505" text-anchor="middle">⋮</text>

  <!-- leaves -->
  <rect x="100" y="524" width="720" height="46" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="b" x="460" y="555" text-anchor="middle">n leaves of size 1 — base case, O(1) each</text>

  <!-- per-level cost pills -->
  <rect class="pill" x="860" y="120" width="180" height="44" rx="10"/>
  <text class="cs" x="950" y="148" text-anchor="middle">n</text>
  <text class="s" x="1055" y="148">level 0</text>
  <rect class="pill" x="860" y="222" width="180" height="44" rx="10"/>
  <text class="cs" x="950" y="250" text-anchor="middle">2·(n/2) = n</text>
  <text class="s" x="1055" y="250">level 1</text>
  <rect class="pill" x="860" y="322" width="180" height="44" rx="10"/>
  <text class="cs" x="950" y="350" text-anchor="middle">4·(n/4) = n</text>
  <text class="s" x="1055" y="350">level 2</text>
  <rect class="pill" x="860" y="422" width="180" height="44" rx="10"/>
  <text class="cs" x="950" y="450" text-anchor="middle">8·(n/8) = n</text>
  <text class="s" x="1055" y="450">level 3</text>
  <rect class="pill" x="860" y="525" width="180" height="44" rx="10"/>
  <text class="cs" x="950" y="553" text-anchor="middle">n·1 = n</text>
  <text class="s" x="1055" y="553">last level</text>

  <!-- total -->
  <rect x="100" y="608" width="1040" height="56" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="b" x="620" y="644" text-anchor="middle">Every level costs n  ×  log₂ n levels   ⇒   T(n) = n log₂ n = Θ(n log n)</text>
</svg>
