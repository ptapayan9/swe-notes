<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Sift-down swap path after popping the heap minimum</title>
  <desc id="desc">Two trees. Left: after popping 1, the last leaf 9 sits at the root of [9, 3, 2, 7, 4, 8]; blue arrows show its path, swapping with the smaller child 2 and then with 8. Right: the restored min-heap [2, 3, 8, 7, 4, 9] with 9 resting at a leaf.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cell  { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .red   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2.5; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2.5; }
    .edge  { stroke: #6b7280; stroke-width: 2; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .path  { stroke: #0ea5e9; stroke-width: 5; fill: none; }
    .val   { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; }
    .swap  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0ea5e9; }
  </style>
  <defs>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="620" fill="#ffffff"/>

  <text class="title" x="60" y="58">Sift-down: follow the smaller child</text>
  <line class="rule" x1="60" y1="78" x2="1140" y2="78"/>

  <text class="body" x="320" y="128" text-anchor="middle">Before: last leaf 9 moved to the root</text>
  <text class="body" x="880" y="128" text-anchor="middle">After two swaps: min-heap restored</text>

  <line class="rule" x1="602" y1="100" x2="602" y2="520"/>

  <!-- LEFT tree edges -->
  <line class="edge" x1="320" y1="215" x2="180" y2="335"/>
  <line class="edge" x1="320" y1="215" x2="460" y2="335"/>
  <line class="edge" x1="180" y1="335" x2="110" y2="455"/>
  <line class="edge" x1="180" y1="335" x2="250" y2="455"/>
  <line class="edge" x1="460" y1="335" x2="390" y2="455"/>

  <!-- LEFT swap-path arrows -->
  <line class="path" x1="349" y1="240" x2="428" y2="308" marker-end="url(#arrowblue)"/>
  <line class="path" x1="440" y1="370" x2="411" y2="419" marker-end="url(#arrowblue)"/>
  <text class="swap" x="404" y="262">swap 1: 9 &gt; 2</text>
  <text class="swap" x="452" y="402">swap 2: 9 &gt; 8</text>

  <!-- LEFT nodes -->
  <circle class="red"  cx="320" cy="215" r="34"/>
  <circle class="cell" cx="180" cy="335" r="34"/>
  <circle class="cell" cx="460" cy="335" r="34"/>
  <circle class="cell" cx="110" cy="455" r="34"/>
  <circle class="cell" cx="250" cy="455" r="34"/>
  <circle class="cell" cx="390" cy="455" r="34"/>
  <text class="val" x="320" y="223" text-anchor="middle">9</text>
  <text class="val" x="180" y="343" text-anchor="middle">3</text>
  <text class="val" x="460" y="343" text-anchor="middle">2</text>
  <text class="val" x="110" y="463" text-anchor="middle">7</text>
  <text class="val" x="250" y="463" text-anchor="middle">4</text>
  <text class="val" x="390" y="463" text-anchor="middle">8</text>
  <text class="code" x="320" y="530" text-anchor="middle">[9, 3, 2, 7, 4, 8]</text>

  <!-- RIGHT tree edges -->
  <line class="edge" x1="880" y1="215" x2="740" y2="335"/>
  <line class="edge" x1="880" y1="215" x2="1020" y2="335"/>
  <line class="edge" x1="740" y1="335" x2="670" y2="455"/>
  <line class="edge" x1="740" y1="335" x2="810" y2="455"/>
  <line class="edge" x1="1020" y1="335" x2="950" y2="455"/>

  <!-- RIGHT nodes -->
  <circle class="green" cx="880"  cy="215" r="34"/>
  <circle class="cell"  cx="740"  cy="335" r="34"/>
  <circle class="green" cx="1020" cy="335" r="34"/>
  <circle class="cell"  cx="670"  cy="455" r="34"/>
  <circle class="cell"  cx="810"  cy="455" r="34"/>
  <circle class="red"   cx="950"  cy="455" r="34"/>
  <text class="val" x="880"  y="223" text-anchor="middle">2</text>
  <text class="val" x="740"  y="343" text-anchor="middle">3</text>
  <text class="val" x="1020" y="343" text-anchor="middle">8</text>
  <text class="val" x="670"  y="463" text-anchor="middle">7</text>
  <text class="val" x="810"  y="463" text-anchor="middle">4</text>
  <text class="val" x="950"  y="463" text-anchor="middle">9</text>
  <text class="code" x="880" y="530" text-anchor="middle">[2, 3, 8, 7, 4, 9]</text>

  <text class="muted" x="600" y="586" text-anchor="middle">9 sinks along the smaller-child path — at most one swap per level, so pop costs O(log n).</text>
</svg>
