<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" role="img" aria-labelledby="title desc">
  <title id="title">Array-to-tree index mapping in a binary min-heap</title>
  <desc id="desc">A seven-element array [2, 4, 3, 9, 7, 8, 10] shown as indexed cells, and the same data drawn as a complete binary tree. Node i=1 is highlighted in blue, its children at indices 3 and 4 in green, and its parent at index 0 in amber, illustrating left(i)=2i+1, right(i)=2i+2, parent(i)=(i-1)//2.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cell  { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .amber { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2.5; }
    .blue  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2.5; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2.5; }
    .edge  { stroke: #6b7280; stroke-width: 2; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .val   { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; }
  </style>
  <rect x="0" y="0" width="1200" height="680" fill="#ffffff"/>

  <text class="title" x="60" y="58">One array, two views</text>
  <line class="rule" x1="60" y1="78" x2="1140" y2="78"/>

  <!-- array view: 7 cells, 110px wide, starting x=215 -->
  <rect class="amber" x="215" y="112" width="110" height="64"/>
  <rect class="blue"  x="325" y="112" width="110" height="64"/>
  <rect class="cell"  x="435" y="112" width="110" height="64"/>
  <rect class="green" x="545" y="112" width="110" height="64"/>
  <rect class="green" x="655" y="112" width="110" height="64"/>
  <rect class="cell"  x="765" y="112" width="110" height="64"/>
  <rect class="cell"  x="875" y="112" width="110" height="64"/>

  <text class="val" x="270" y="152" text-anchor="middle">2</text>
  <text class="val" x="380" y="152" text-anchor="middle">4</text>
  <text class="val" x="490" y="152" text-anchor="middle">3</text>
  <text class="val" x="600" y="152" text-anchor="middle">9</text>
  <text class="val" x="710" y="152" text-anchor="middle">7</text>
  <text class="val" x="820" y="152" text-anchor="middle">8</text>
  <text class="val" x="930" y="152" text-anchor="middle">10</text>

  <text class="small" x="270" y="204" text-anchor="middle">i = 0</text>
  <text class="small" x="380" y="204" text-anchor="middle">i = 1</text>
  <text class="small" x="490" y="204" text-anchor="middle">i = 2</text>
  <text class="small" x="600" y="204" text-anchor="middle">i = 3</text>
  <text class="small" x="710" y="204" text-anchor="middle">i = 4</text>
  <text class="small" x="820" y="204" text-anchor="middle">i = 5</text>
  <text class="small" x="930" y="204" text-anchor="middle">i = 6</text>

  <!-- index arithmetic for the highlighted node -->
  <text class="code" x="600" y="256" text-anchor="middle">left(1) = 2·1+1 = 3    right(1) = 2·1+2 = 4    parent(1) = (1−1)//2 = 0</text>

  <!-- tree view: edges first -->
  <line class="edge" x1="600" y1="360" x2="390" y2="472"/>
  <line class="edge" x1="600" y1="360" x2="810" y2="472"/>
  <line class="edge" x1="390" y1="472" x2="285" y2="584"/>
  <line class="edge" x1="390" y1="472" x2="495" y2="584"/>
  <line class="edge" x1="810" y1="472" x2="705" y2="584"/>
  <line class="edge" x1="810" y1="472" x2="915" y2="584"/>

  <!-- tree nodes -->
  <circle class="amber" cx="600" cy="360" r="38"/>
  <circle class="blue"  cx="390" cy="472" r="38"/>
  <circle class="cell"  cx="810" cy="472" r="38"/>
  <circle class="green" cx="285" cy="584" r="38"/>
  <circle class="green" cx="495" cy="584" r="38"/>
  <circle class="cell"  cx="705" cy="584" r="38"/>
  <circle class="cell"  cx="915" cy="584" r="38"/>

  <text class="val" x="600" y="358" text-anchor="middle">2</text>
  <text class="small" x="600" y="382" text-anchor="middle">i = 0</text>
  <text class="val" x="390" y="470" text-anchor="middle">4</text>
  <text class="small" x="390" y="494" text-anchor="middle">i = 1</text>
  <text class="val" x="810" y="470" text-anchor="middle">3</text>
  <text class="small" x="810" y="494" text-anchor="middle">i = 2</text>
  <text class="val" x="285" y="582" text-anchor="middle">9</text>
  <text class="small" x="285" y="606" text-anchor="middle">i = 3</text>
  <text class="val" x="495" y="582" text-anchor="middle">7</text>
  <text class="small" x="495" y="606" text-anchor="middle">i = 4</text>
  <text class="val" x="705" y="582" text-anchor="middle">8</text>
  <text class="small" x="705" y="606" text-anchor="middle">i = 5</text>
  <text class="val" x="915" y="582" text-anchor="middle">10</text>
  <text class="small" x="915" y="606" text-anchor="middle">i = 6</text>

  <text class="small" x="600" y="660" text-anchor="middle">amber = parent of i=1   ·   blue = node i=1   ·   green = children of i=1 — same data, zero pointers</text>
</svg>
