<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">Floyd's tortoise and hare in a cycle</title>
  <desc id="desc">A linked list with a two-node tail leading into a six-node cycle drawn as a ring. The slow pointer sits on one ring node (green) and the fast pointer on another (purple). Captions explain that the gap between them shrinks by one node per step, so they must meet.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .node { fill: #ffffff; stroke: #6b7280; stroke-width: 2; }
    .entry { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
    .slow { fill: #dcfce7; stroke: #86efac; stroke-width: 3; }
    .fast { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 3; }
    .rule { stroke: #e5e7eb; stroke-width: 2; }
    .edge { stroke: #0ea5e9; stroke-width: 3; fill: none; }
    .ptr  { stroke: #8b5cf6; stroke-width: 3; fill: none; }
  </style>
  <rect width="1200" height="660" fill="#ffffff"/>
  <defs>
    <marker id="eBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <text class="t" x="60" y="64">Floyd's tortoise and hare: the gap shrinks by 1 per step</text>
  <line class="rule" x1="60" y1="90" x2="1140" y2="90"/>

  <!-- head pointer -->
  <text class="c" x="170" y="272" text-anchor="middle">head</text>
  <line class="ptr" x1="170" y1="282" x2="170" y2="306" marker-end="url(#eBlue)"/>

  <!-- tail nodes -->
  <circle class="node" cx="170" cy="350" r="38"/>
  <text class="b" x="170" y="359" text-anchor="middle">1</text>
  <circle class="node" cx="400" cy="350" r="38"/>
  <text class="b" x="400" y="359" text-anchor="middle">2</text>

  <!-- cycle nodes: entry C(3) at 180deg, ring of 6, center (820,350) R=180 -->
  <circle class="entry" cx="640" cy="350" r="38"/>
  <text class="b" x="640" y="359" text-anchor="middle">3</text>
  <circle class="node" cx="730" cy="194" r="38"/>
  <text class="b" x="730" y="203" text-anchor="middle">4</text>
  <circle class="slow" cx="910" cy="194" r="38"/>
  <text class="b" x="910" y="203" text-anchor="middle">5</text>
  <circle class="node" cx="1000" cy="350" r="38"/>
  <text class="b" x="1000" y="359" text-anchor="middle">6</text>
  <circle class="fast" cx="910" cy="506" r="38"/>
  <text class="b" x="910" y="515" text-anchor="middle">7</text>
  <circle class="node" cx="730" cy="506" r="38"/>
  <text class="b" x="730" y="515" text-anchor="middle">8</text>

  <!-- tail edges -->
  <line class="edge" x1="214" y1="350" x2="354" y2="350" marker-end="url(#eBlue)"/>
  <line class="edge" x1="444" y1="350" x2="594" y2="350" marker-end="url(#eBlue)"/>

  <!-- ring edges (clockwise 3->4->5->6->7->8->3) -->
  <line class="edge" x1="662" y1="311.9" x2="708" y2="232.1" marker-end="url(#eBlue)"/>
  <line class="edge" x1="774" y1="194" x2="866" y2="194" marker-end="url(#eBlue)"/>
  <line class="edge" x1="932" y1="232.1" x2="978" y2="311.9" marker-end="url(#eBlue)"/>
  <line class="edge" x1="978" y1="388.1" x2="932" y2="467.9" marker-end="url(#eBlue)"/>
  <line class="edge" x1="866" y1="506" x2="774" y2="506" marker-end="url(#eBlue)"/>
  <line class="edge" x1="708" y1="467.9" x2="662" y2="388.1" marker-end="url(#eBlue)"/>

  <!-- pointer labels -->
  <text class="c" x="910" y="140" text-anchor="middle">slow</text>
  <text class="c" x="910" y="578" text-anchor="middle">fast</text>
  <text class="s" x="640" y="420" text-anchor="middle">cycle entry</text>

  <!-- mu / lambda annotations -->
  <text class="m" x="285" y="436" text-anchor="middle">&#956; = 2 tail nodes</text>
  <text class="m" x="820" y="358" text-anchor="middle">&#955; = 6</text>

  <!-- caption -->
  <text class="m" x="60" y="608">Inside the cycle, fast gains exactly one node per step on slow: the gap shrinks by 1 (mod &#955;).</text>
  <text class="m" x="60" y="640">A gap of 0 is a meeting, within at most &#955; steps. Moving one node at a time, fast can never jump over slow.</text>
</svg>
