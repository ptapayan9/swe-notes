<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">Overlapping subproblems in the fib(5) call tree</title>
  <desc id="desc">The naive recursion tree for fib(5) makes 15 calls but contains only 6 unique states. Green nodes are computed once; red nodes are repeat calls that memoization turns into cache hits.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .n { font: 700 20px "SFMono-Regular", Consolas, monospace; fill: #111827; }
    .edge { stroke: #6b7280; stroke-width: 2; }
    .g { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .r { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
  </style>
  <rect width="1200" height="660" fill="#ffffff"/>

  <text class="t" x="60" y="52">Overlapping subproblems: the fib(5) call tree</text>
  <line x1="60" y1="72" x2="1140" y2="72" stroke="#e5e7eb" stroke-width="2"/>

  <text class="m" x="930" y="140">naive calls: 15</text>
  <text class="m" x="930" y="172">unique states: 6</text>

  <!-- edges -->
  <line class="edge" x1="560" y1="163" x2="330" y2="227"/>
  <line class="edge" x1="560" y1="163" x2="800" y2="227"/>
  <line class="edge" x1="330" y1="273" x2="200" y2="337"/>
  <line class="edge" x1="330" y1="273" x2="460" y2="337"/>
  <line class="edge" x1="800" y1="273" x2="700" y2="337"/>
  <line class="edge" x1="800" y1="273" x2="910" y2="337"/>
  <line class="edge" x1="200" y1="383" x2="110" y2="447"/>
  <line class="edge" x1="200" y1="383" x2="290" y2="447"/>
  <line class="edge" x1="460" y1="383" x2="400" y2="447"/>
  <line class="edge" x1="460" y1="383" x2="520" y2="447"/>
  <line class="edge" x1="700" y1="383" x2="640" y2="447"/>
  <line class="edge" x1="700" y1="383" x2="760" y2="447"/>
  <line class="edge" x1="110" y1="493" x2="60" y2="547"/>
  <line class="edge" x1="110" y1="493" x2="170" y2="547"/>

  <!-- level 0 -->
  <rect class="g" x="510" y="117" width="100" height="46" rx="8"/>
  <text class="n" x="560" y="147" text-anchor="middle">fib(5)</text>

  <!-- level 1 -->
  <rect class="g" x="280" y="227" width="100" height="46" rx="8"/>
  <text class="n" x="330" y="257" text-anchor="middle">fib(4)</text>
  <rect class="r" x="750" y="227" width="100" height="46" rx="8"/>
  <text class="n" x="800" y="257" text-anchor="middle">fib(3)</text>

  <!-- level 2 -->
  <rect class="g" x="150" y="337" width="100" height="46" rx="8"/>
  <text class="n" x="200" y="367" text-anchor="middle">fib(3)</text>
  <rect class="r" x="410" y="337" width="100" height="46" rx="8"/>
  <text class="n" x="460" y="367" text-anchor="middle">fib(2)</text>
  <rect class="r" x="650" y="337" width="100" height="46" rx="8"/>
  <text class="n" x="700" y="367" text-anchor="middle">fib(2)</text>
  <rect class="r" x="860" y="337" width="100" height="46" rx="8"/>
  <text class="n" x="910" y="367" text-anchor="middle">fib(1)</text>

  <!-- level 3 -->
  <rect class="g" x="60" y="447" width="100" height="46" rx="8"/>
  <text class="n" x="110" y="477" text-anchor="middle">fib(2)</text>
  <rect class="r" x="240" y="447" width="100" height="46" rx="8"/>
  <text class="n" x="290" y="477" text-anchor="middle">fib(1)</text>
  <rect class="r" x="350" y="447" width="100" height="46" rx="8"/>
  <text class="n" x="400" y="477" text-anchor="middle">fib(1)</text>
  <rect class="r" x="470" y="447" width="100" height="46" rx="8"/>
  <text class="n" x="520" y="477" text-anchor="middle">fib(0)</text>
  <rect class="r" x="590" y="447" width="100" height="46" rx="8"/>
  <text class="n" x="640" y="477" text-anchor="middle">fib(1)</text>
  <rect class="r" x="710" y="447" width="100" height="46" rx="8"/>
  <text class="n" x="760" y="477" text-anchor="middle">fib(0)</text>

  <!-- level 4 -->
  <rect class="g" x="10" y="547" width="100" height="46" rx="8"/>
  <text class="n" x="60" y="577" text-anchor="middle">fib(1)</text>
  <rect class="g" x="120" y="547" width="100" height="46" rx="8"/>
  <text class="n" x="170" y="577" text-anchor="middle">fib(0)</text>

  <!-- legend -->
  <rect class="g" x="60" y="614" width="26" height="26" rx="4"/>
  <text class="b" x="98" y="634">computed once — 6 unique states</text>
  <rect class="r" x="560" y="614" width="26" height="26" rx="4"/>
  <text class="b" x="598" y="634">repeat call — a cache hit once memoized</text>
</svg>
