<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="title desc">
  <title id="title">One mask, three actions: set, clear, toggle</title>
  <desc id="desc">An 8-bit value n equals 101 and the mask 1 shifted left by 3, then three result rows: OR with the mask sets bit 3, AND with the inverted mask clears it, XOR with the mask toggles it. Only the masked column changes.</desc>
  <style>
    .title  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body   { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .bodyb  { font: 600 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted  { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .code   { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .code20 { font: 700 20px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .code16 { font: 700 16px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .digit  { font: 700 28px "SFMono-Regular", Consolas, monospace; fill: #111827; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="56" class="title">One mask, three actions: set, clear, toggle</text>
  <line x1="60" y1="84" x2="1140" y2="84" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="722" y="118" width="90" height="520" fill="#dbeafe" opacity="0.40"/>
  <text x="312" y="142" class="small" text-anchor="end">bit index</text>
  <text x="375" y="142" class="small" text-anchor="middle">7</text>
  <text x="473" y="142" class="small" text-anchor="middle">6</text>
  <text x="571" y="142" class="small" text-anchor="middle">5</text>
  <text x="669" y="142" class="small" text-anchor="middle">4</text>
  <text x="767" y="142" class="small" text-anchor="middle">3</text>
  <text x="865" y="142" class="small" text-anchor="middle">2</text>
  <text x="963" y="142" class="small" text-anchor="middle">1</text>
  <text x="1061" y="142" class="small" text-anchor="middle">0</text>
  <text x="312" y="204" class="code20" text-anchor="end">n = 101</text>
  <rect x="330" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="375" y="205" class="digit" text-anchor="middle">0</text>
  <rect x="428" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="473" y="205" class="digit" text-anchor="middle">1</text>
  <rect x="526" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="571" y="205" class="digit" text-anchor="middle">1</text>
  <rect x="624" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="669" y="205" class="digit" text-anchor="middle">0</text>
  <rect x="722" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="767" y="205" class="digit" text-anchor="middle">0</text>
  <rect x="820" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="865" y="205" class="digit" text-anchor="middle">1</text>
  <rect x="918" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="963" y="205" class="digit" text-anchor="middle">0</text>
  <rect x="1016" y="160" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="1061" y="205" class="digit" text-anchor="middle">1</text>
  <text x="312" y="299" class="code20" text-anchor="end">m = 1&lt;&lt;3  (8)</text>
  <rect x="330" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="375" y="300" class="digit" text-anchor="middle">0</text>
  <rect x="428" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="473" y="300" class="digit" text-anchor="middle">0</text>
  <rect x="526" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="571" y="300" class="digit" text-anchor="middle">0</text>
  <rect x="624" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="669" y="300" class="digit" text-anchor="middle">0</text>
  <rect x="722" y="255" width="90" height="70" rx="6" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text x="767" y="300" class="digit" text-anchor="middle">1</text>
  <rect x="820" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="865" y="300" class="digit" text-anchor="middle">0</text>
  <rect x="918" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="963" y="300" class="digit" text-anchor="middle">0</text>
  <rect x="1016" y="255" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="1061" y="300" class="digit" text-anchor="middle">0</text>
  <text x="60" y="350" class="muted">apply one operator to the same mask:</text>
  <line x1="60" y1="358" x2="1140" y2="358" stroke="#e5e7eb" stroke-width="2"/>
  <text x="312" y="419" class="code20" text-anchor="end">n | m = 109</text>
  <text x="312" y="441" class="small" text-anchor="end">(set: force 1)</text>
  <rect x="330" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="375" y="420" class="digit" text-anchor="middle">0</text>
  <rect x="428" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="473" y="420" class="digit" text-anchor="middle">1</text>
  <rect x="526" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="571" y="420" class="digit" text-anchor="middle">1</text>
  <rect x="624" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="669" y="420" class="digit" text-anchor="middle">0</text>
  <rect x="722" y="375" width="90" height="70" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="767" y="420" class="digit" text-anchor="middle">1</text>
  <rect x="820" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="865" y="420" class="digit" text-anchor="middle">1</text>
  <rect x="918" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="963" y="420" class="digit" text-anchor="middle">0</text>
  <rect x="1016" y="375" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="1061" y="420" class="digit" text-anchor="middle">1</text>
  <text x="312" y="514" class="code20" text-anchor="end">n &amp; ~m = 101</text>
  <text x="312" y="536" class="small" text-anchor="end">(clear: force 0)</text>
  <rect x="330" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="375" y="515" class="digit" text-anchor="middle">0</text>
  <rect x="428" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="473" y="515" class="digit" text-anchor="middle">1</text>
  <rect x="526" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="571" y="515" class="digit" text-anchor="middle">1</text>
  <rect x="624" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="669" y="515" class="digit" text-anchor="middle">0</text>
  <rect x="722" y="470" width="90" height="70" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="767" y="515" class="digit" text-anchor="middle">0</text>
  <rect x="820" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="865" y="515" class="digit" text-anchor="middle">1</text>
  <rect x="918" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="963" y="515" class="digit" text-anchor="middle">0</text>
  <rect x="1016" y="470" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="1061" y="515" class="digit" text-anchor="middle">1</text>
  <text x="312" y="609" class="code20" text-anchor="end">n ^ m = 109</text>
  <text x="312" y="631" class="small" text-anchor="end">(toggle: invert)</text>
  <rect x="330" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="375" y="610" class="digit" text-anchor="middle">0</text>
  <rect x="428" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="473" y="610" class="digit" text-anchor="middle">1</text>
  <rect x="526" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="571" y="610" class="digit" text-anchor="middle">1</text>
  <rect x="624" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="669" y="610" class="digit" text-anchor="middle">0</text>
  <rect x="722" y="565" width="90" height="70" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="767" y="610" class="digit" text-anchor="middle">1</text>
  <rect x="820" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="865" y="610" class="digit" text-anchor="middle">1</text>
  <rect x="918" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="963" y="610" class="digit" text-anchor="middle">0</text>
  <rect x="1016" y="565" width="90" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="1061" y="610" class="digit" text-anchor="middle">1</text>
  <text x="60" y="688" class="muted">The mask picks the column; the operator picks the action. set and clear are idempotent; toggle inverts every time.</text>
</svg>
