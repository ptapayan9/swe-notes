<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Two's complement: the same 4 bits, read two ways</title>
  <desc id="desc">A number line of all sixteen 4-bit patterns from -8 to +7 showing the signed two's-complement value and the unsigned value of each pattern, plus the flip-bits-and-add-one negation rule applied to 5.</desc>
  <style>
    .title  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body   { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .bodyb  { font: 600 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted  { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .code   { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .code20 { font: 700 20px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .code16 { font: 700 16px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .digit  { font: 700 28px "SFMono-Regular", Consolas, monospace; fill: #111827; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="540" fill="#ffffff"/>
  <text x="60" y="56" class="title">Two's complement: the same 4 bits, read two ways</text>
  <line x1="60" y1="84" x2="1140" y2="84" stroke="#e5e7eb" stroke-width="2"/>
  <text x="60" y="122" class="muted">row 1: bit pattern   ·   row 2: signed value (two's complement)   ·   row 3: unsigned value of the same bits</text>
  <text x="91.0" y="156" class="code16" text-anchor="middle">1000</text>
  <rect x="60.0" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="91.0" y="212" class="digit" text-anchor="middle">−8</text>
  <text x="91.0" y="260" class="small" text-anchor="middle">8</text>
  <text x="158.5" y="156" class="code16" text-anchor="middle">1001</text>
  <rect x="127.5" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="158.5" y="212" class="digit" text-anchor="middle">−7</text>
  <text x="158.5" y="260" class="small" text-anchor="middle">9</text>
  <text x="226.0" y="156" class="code16" text-anchor="middle">1010</text>
  <rect x="195.0" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="226.0" y="212" class="digit" text-anchor="middle">−6</text>
  <text x="226.0" y="260" class="small" text-anchor="middle">10</text>
  <text x="293.5" y="156" class="code16" text-anchor="middle">1011</text>
  <rect x="262.5" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="293.5" y="212" class="digit" text-anchor="middle">−5</text>
  <text x="293.5" y="260" class="small" text-anchor="middle">11</text>
  <text x="361.0" y="156" class="code16" text-anchor="middle">1100</text>
  <rect x="330.0" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="361.0" y="212" class="digit" text-anchor="middle">−4</text>
  <text x="361.0" y="260" class="small" text-anchor="middle">12</text>
  <text x="428.5" y="156" class="code16" text-anchor="middle">1101</text>
  <rect x="397.5" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="428.5" y="212" class="digit" text-anchor="middle">−3</text>
  <text x="428.5" y="260" class="small" text-anchor="middle">13</text>
  <text x="496.0" y="156" class="code16" text-anchor="middle">1110</text>
  <rect x="465.0" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="496.0" y="212" class="digit" text-anchor="middle">−2</text>
  <text x="496.0" y="260" class="small" text-anchor="middle">14</text>
  <text x="563.5" y="156" class="code16" text-anchor="middle">1111</text>
  <rect x="532.5" y="170" width="62" height="64" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="563.5" y="212" class="digit" text-anchor="middle">−1</text>
  <text x="563.5" y="260" class="small" text-anchor="middle">15</text>
  <text x="631.0" y="156" class="code16" text-anchor="middle">0000</text>
  <rect x="600.0" y="170" width="62" height="64" rx="6" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text x="631.0" y="212" class="digit" text-anchor="middle">0</text>
  <text x="631.0" y="260" class="small" text-anchor="middle">0</text>
  <text x="698.5" y="156" class="code16" text-anchor="middle">0001</text>
  <rect x="667.5" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="698.5" y="212" class="digit" text-anchor="middle">1</text>
  <text x="698.5" y="260" class="small" text-anchor="middle">1</text>
  <text x="766.0" y="156" class="code16" text-anchor="middle">0010</text>
  <rect x="735.0" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="766.0" y="212" class="digit" text-anchor="middle">2</text>
  <text x="766.0" y="260" class="small" text-anchor="middle">2</text>
  <text x="833.5" y="156" class="code16" text-anchor="middle">0011</text>
  <rect x="802.5" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="833.5" y="212" class="digit" text-anchor="middle">3</text>
  <text x="833.5" y="260" class="small" text-anchor="middle">3</text>
  <text x="901.0" y="156" class="code16" text-anchor="middle">0100</text>
  <rect x="870.0" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="901.0" y="212" class="digit" text-anchor="middle">4</text>
  <text x="901.0" y="260" class="small" text-anchor="middle">4</text>
  <text x="968.5" y="156" class="code16" text-anchor="middle">0101</text>
  <rect x="937.5" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="968.5" y="212" class="digit" text-anchor="middle">5</text>
  <text x="968.5" y="260" class="small" text-anchor="middle">5</text>
  <text x="1036.0" y="156" class="code16" text-anchor="middle">0110</text>
  <rect x="1005.0" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="1036.0" y="212" class="digit" text-anchor="middle">6</text>
  <text x="1036.0" y="260" class="small" text-anchor="middle">6</text>
  <text x="1103.5" y="156" class="code16" text-anchor="middle">0111</text>
  <rect x="1072.5" y="170" width="62" height="64" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="1103.5" y="212" class="digit" text-anchor="middle">7</text>
  <text x="1103.5" y="260" class="small" text-anchor="middle">7</text>
  <text x="60" y="336" class="bodyb">Negation rule: flip every bit, then add one   (−n = ~n + 1)</text>
  <rect x="60" y="358" width="170" height="56" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="145" y="394" class="code" text-anchor="middle">0101 = 5</text>
  <line x1="240" y1="386" x2="295" y2="386" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="268" y="372" class="small" text-anchor="middle">~ flip</text>
  <rect x="300" y="358" width="120" height="56" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="360" y="394" class="code" text-anchor="middle">1010</text>
  <line x1="430" y1="386" x2="485" y2="386" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="458" y="372" class="small" text-anchor="middle">+ 1</text>
  <rect x="490" y="358" width="200" height="56" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="590" y="394" class="code" text-anchor="middle">1011 = −5</text>
  <text x="730" y="394" class="muted">check: −8 + 2 + 1 = −5  (top bit weighs −8)</text>
  <text x="60" y="484" class="muted">MSB set ⇒ negative.  Range −8 … +7 (one extra negative).  Adding 1 to 0111 (+7) wraps around to 1000 (−8).</text>
</svg>
