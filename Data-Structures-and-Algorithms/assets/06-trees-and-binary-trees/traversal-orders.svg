<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">One tree, four traversal orders</title>
  <desc id="desc">The same six-node binary tree drawn four times. Blue badges number the visit order for preorder, inorder, postorder, and level order.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .val   { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; text-anchor: middle; }
    .ord   { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; text-anchor: middle; }
    .node  { fill: #ffffff; stroke: #6b7280; stroke-width: 2.5; }
    .badge { fill: #0ea5e9; stroke: none; }
    .edge  { stroke: #4b5563; stroke-width: 2.5; }
    .grid  { stroke: #e5e7eb; stroke-width: 2; }
  </style>
  <rect width="1200" height="760" fill="#ffffff"/>

  <text x="40" y="56" class="title">One tree, four traversal orders</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- grid dividers -->
  <line x1="600" y1="100" x2="600" y2="730" class="grid"/>
  <line x1="40" y1="445" x2="1160" y2="445" class="grid"/>

  <!-- ===== Cell 1: Preorder ===== -->
  <text x="80" y="146" class="code">Preorder: 1 2 4 5 3 6</text>
  <text x="80" y="176" class="small">visit root, then left subtree, then right subtree</text>
  <line x1="320" y1="245" x2="220" y2="323" class="edge"/>
  <line x1="320" y1="245" x2="420" y2="323" class="edge"/>
  <line x1="220" y1="323" x2="165" y2="401" class="edge"/>
  <line x1="220" y1="323" x2="275" y2="401" class="edge"/>
  <line x1="420" y1="323" x2="480" y2="401" class="edge"/>
  <circle cx="320" cy="245" r="26" class="node"/><text x="320" y="253" class="val">1</text>
  <circle cx="220" cy="323" r="26" class="node"/><text x="220" y="331" class="val">2</text>
  <circle cx="420" cy="323" r="26" class="node"/><text x="420" y="331" class="val">3</text>
  <circle cx="165" cy="401" r="26" class="node"/><text x="165" y="409" class="val">4</text>
  <circle cx="275" cy="401" r="26" class="node"/><text x="275" y="409" class="val">5</text>
  <circle cx="480" cy="401" r="26" class="node"/><text x="480" y="409" class="val">6</text>
  <circle cx="350" cy="221" r="15" class="badge"/><text x="350" y="227" class="ord">1</text>
  <circle cx="250" cy="299" r="15" class="badge"/><text x="250" y="305" class="ord">2</text>
  <circle cx="450" cy="299" r="15" class="badge"/><text x="450" y="305" class="ord">5</text>
  <circle cx="195" cy="377" r="15" class="badge"/><text x="195" y="383" class="ord">3</text>
  <circle cx="305" cy="377" r="15" class="badge"/><text x="305" y="383" class="ord">4</text>
  <circle cx="510" cy="377" r="15" class="badge"/><text x="510" y="383" class="ord">6</text>

  <!-- ===== Cell 2: Inorder ===== -->
  <text x="660" y="146" class="code">Inorder: 4 2 5 1 3 6</text>
  <text x="660" y="176" class="small">left subtree, then root, then right subtree</text>
  <line x1="900" y1="245" x2="800" y2="323" class="edge"/>
  <line x1="900" y1="245" x2="1000" y2="323" class="edge"/>
  <line x1="800" y1="323" x2="745" y2="401" class="edge"/>
  <line x1="800" y1="323" x2="855" y2="401" class="edge"/>
  <line x1="1000" y1="323" x2="1060" y2="401" class="edge"/>
  <circle cx="900" cy="245" r="26" class="node"/><text x="900" y="253" class="val">1</text>
  <circle cx="800" cy="323" r="26" class="node"/><text x="800" y="331" class="val">2</text>
  <circle cx="1000" cy="323" r="26" class="node"/><text x="1000" y="331" class="val">3</text>
  <circle cx="745" cy="401" r="26" class="node"/><text x="745" y="409" class="val">4</text>
  <circle cx="855" cy="401" r="26" class="node"/><text x="855" y="409" class="val">5</text>
  <circle cx="1060" cy="401" r="26" class="node"/><text x="1060" y="409" class="val">6</text>
  <circle cx="930" cy="221" r="15" class="badge"/><text x="930" y="227" class="ord">4</text>
  <circle cx="830" cy="299" r="15" class="badge"/><text x="830" y="305" class="ord">2</text>
  <circle cx="1030" cy="299" r="15" class="badge"/><text x="1030" y="305" class="ord">5</text>
  <circle cx="775" cy="377" r="15" class="badge"/><text x="775" y="383" class="ord">1</text>
  <circle cx="885" cy="377" r="15" class="badge"/><text x="885" y="383" class="ord">3</text>
  <circle cx="1090" cy="377" r="15" class="badge"/><text x="1090" y="383" class="ord">6</text>

  <!-- ===== Cell 3: Postorder ===== -->
  <text x="80" y="476" class="code">Postorder: 4 5 2 6 3 1</text>
  <text x="80" y="506" class="small">left subtree, then right subtree, then root</text>
  <line x1="320" y1="565" x2="220" y2="643" class="edge"/>
  <line x1="320" y1="565" x2="420" y2="643" class="edge"/>
  <line x1="220" y1="643" x2="165" y2="721" class="edge"/>
  <line x1="220" y1="643" x2="275" y2="721" class="edge"/>
  <line x1="420" y1="643" x2="480" y2="721" class="edge"/>
  <circle cx="320" cy="565" r="26" class="node"/><text x="320" y="573" class="val">1</text>
  <circle cx="220" cy="643" r="26" class="node"/><text x="220" y="651" class="val">2</text>
  <circle cx="420" cy="643" r="26" class="node"/><text x="420" y="651" class="val">3</text>
  <circle cx="165" cy="721" r="26" class="node"/><text x="165" y="729" class="val">4</text>
  <circle cx="275" cy="721" r="26" class="node"/><text x="275" y="729" class="val">5</text>
  <circle cx="480" cy="721" r="26" class="node"/><text x="480" y="729" class="val">6</text>
  <circle cx="350" cy="541" r="15" class="badge"/><text x="350" y="547" class="ord">6</text>
  <circle cx="250" cy="619" r="15" class="badge"/><text x="250" y="625" class="ord">3</text>
  <circle cx="450" cy="619" r="15" class="badge"/><text x="450" y="625" class="ord">5</text>
  <circle cx="195" cy="697" r="15" class="badge"/><text x="195" y="703" class="ord">1</text>
  <circle cx="305" cy="697" r="15" class="badge"/><text x="305" y="703" class="ord">2</text>
  <circle cx="510" cy="697" r="15" class="badge"/><text x="510" y="703" class="ord">4</text>

  <!-- ===== Cell 4: Level order ===== -->
  <text x="660" y="476" class="code">Level order: 1 2 3 4 5 6</text>
  <text x="660" y="506" class="small">depth 0, then depth 1, then depth 2 — left to right</text>
  <line x1="900" y1="565" x2="800" y2="643" class="edge"/>
  <line x1="900" y1="565" x2="1000" y2="643" class="edge"/>
  <line x1="800" y1="643" x2="745" y2="721" class="edge"/>
  <line x1="800" y1="643" x2="855" y2="721" class="edge"/>
  <line x1="1000" y1="643" x2="1060" y2="721" class="edge"/>
  <circle cx="900" cy="565" r="26" class="node"/><text x="900" y="573" class="val">1</text>
  <circle cx="800" cy="643" r="26" class="node"/><text x="800" y="651" class="val">2</text>
  <circle cx="1000" cy="643" r="26" class="node"/><text x="1000" y="651" class="val">3</text>
  <circle cx="745" cy="721" r="26" class="node"/><text x="745" y="729" class="val">4</text>
  <circle cx="855" cy="721" r="26" class="node"/><text x="855" y="729" class="val">5</text>
  <circle cx="1060" cy="721" r="26" class="node"/><text x="1060" y="729" class="val">6</text>
  <circle cx="930" cy="541" r="15" class="badge"/><text x="930" y="547" class="ord">1</text>
  <circle cx="830" cy="619" r="15" class="badge"/><text x="830" y="625" class="ord">2</text>
  <circle cx="1030" cy="619" r="15" class="badge"/><text x="1030" y="625" class="ord">3</text>
  <circle cx="775" cy="697" r="15" class="badge"/><text x="775" y="703" class="ord">4</text>
  <circle cx="885" cy="697" r="15" class="badge"/><text x="885" y="703" class="ord">5</text>
  <circle cx="1090" cy="697" r="15" class="badge"/><text x="1090" y="703" class="ord">6</text>
</svg>
