<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Monotonic stack state while scanning for next greater element</title>
  <desc id="desc">The array 2, 1, 2, 4, 3 with index 3 highlighted as the current element. The stack before this step holds indices 2 and 0, both with smaller values, shown in red because 4 pops both and records itself as their answer. The stack after holds only index 3 with value 4, shown in green.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cell { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .red { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .blue { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .rule { stroke: #e5e7eb; stroke-width: 2; }
    .arr { stroke: #0ea5e9; stroke-width: 3; fill: none; }
    .ptr { stroke: #8b5cf6; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="ab3" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9"/>
    </marker>
    <marker id="ap3" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>

  <text class="t" x="60" y="64">Monotonic stack at i = 3 while scanning [2, 1, 2, 4, 3]</text>
  <line class="rule" x1="60" y1="86" x2="1140" y2="86"/>

  <!-- input array -->
  <text class="s" x="720" y="124" text-anchor="middle">current i</text>
  <rect class="cell" x="300" y="136" width="120" height="80"/>
  <text class="b" x="360" y="186" text-anchor="middle">2</text>
  <rect class="cell" x="420" y="136" width="120" height="80"/>
  <text class="b" x="480" y="186" text-anchor="middle">1</text>
  <rect class="cell" x="540" y="136" width="120" height="80"/>
  <text class="b" x="600" y="186" text-anchor="middle">2</text>
  <rect class="blue" x="660" y="136" width="120" height="80"/>
  <text class="b" x="720" y="186" text-anchor="middle">4</text>
  <rect class="cell" x="780" y="136" width="120" height="80"/>
  <text class="b" x="840" y="186" text-anchor="middle">3</text>
  <text class="s" x="360" y="246" text-anchor="middle">0</text>
  <text class="s" x="480" y="246" text-anchor="middle">1</text>
  <text class="s" x="600" y="246" text-anchor="middle">2</text>
  <text class="s" x="720" y="246" text-anchor="middle">3</text>
  <text class="s" x="840" y="246" text-anchor="middle">4</text>

  <!-- left panel: stack before -->
  <text class="b" x="160" y="310">Stack before (index : value)</text>
  <rect class="red" x="160" y="330" width="240" height="70"/>
  <text class="b" x="280" y="375" text-anchor="middle">2 : 2</text>
  <rect class="red" x="160" y="400" width="240" height="70"/>
  <text class="b" x="280" y="445" text-anchor="middle">0 : 2</text>
  <text class="s" x="112" y="371" text-anchor="end">top</text>
  <line class="ptr" x1="118" y1="365" x2="152" y2="365" marker-end="url(#ap3)"/>
  <text class="m" x="280" y="520" text-anchor="middle">both popped — 4 beats both</text>

  <!-- middle: the rule -->
  <text class="c" x="600" y="360" text-anchor="middle">while stack and</text>
  <text class="c" x="600" y="395" text-anchor="middle">nums[i] &gt; nums[stack[-1]]:</text>
  <text class="c" x="600" y="430" text-anchor="middle">ans[stack.pop()] = nums[i]</text>
  <line class="arr" x1="420" y1="460" x2="780" y2="460" marker-end="url(#ab3)"/>
  <text class="s" x="600" y="488" text-anchor="middle">pops record their answer, then i is pushed</text>

  <!-- right panel: stack after -->
  <text class="b" x="800" y="310">Stack after</text>
  <rect class="green" x="800" y="330" width="240" height="70"/>
  <text class="b" x="920" y="375" text-anchor="middle">3 : 4</text>
  <text class="s" x="1094" y="371">top</text>
  <line class="ptr" x1="1088" y1="365" x2="1054" y2="365" marker-end="url(#ap3)"/>
  <text class="m" x="920" y="445" text-anchor="middle">only index 3 remains</text>

  <!-- bottom: answers -->
  <text class="c" x="600" y="580" text-anchor="middle">this step: ans[2] = 4, ans[0] = 4  →  ans = [4, 2, 4, _, _]</text>
  <text class="m" x="600" y="630" text-anchor="middle">ans[1] = 2 was already set at i = 2; the full scan ends with [4, 2, 4, −1, −1]</text>
  <text class="s" x="600" y="668" text-anchor="middle">invariant: values from bottom to top of the stack never increase</text>
</svg>
