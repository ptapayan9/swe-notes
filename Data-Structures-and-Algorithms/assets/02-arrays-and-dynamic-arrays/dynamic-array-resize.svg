<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic array resize: allocate, copy, free</title>
  <desc id="desc">A full old block of capacity 4 cannot accept a fifth element. A new block of capacity 8 is allocated, the 4 existing elements are copied down into it, the new element lands in slot 4, and three free slots remain for future appends.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .alert { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b91c1c; }
    .cell  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .hot   { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
    .free  { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .nofit { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; stroke-dasharray: 8 6; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .arrow { stroke: #0ea5e9; stroke-width: 3; fill: none; }
    .arrow2 { stroke: #8b5cf6; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="tri" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="tri2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="640" fill="#ffffff"/>
  <text x="60" y="70" class="title">Dynamic array resize: allocate, copy, free</text>
  <line x1="60" y1="92" x2="1140" y2="92" class="rule"/>

  <!-- old block -->
  <text x="80" y="150" class="small">Old block &#8212; capacity 4, size 4 (full)</text>
  <text x="610" y="150" class="alert">append(5) &#8212; no room</text>
  <rect x="80"  y="170" width="120" height="90" class="cell"/>
  <rect x="210" y="170" width="120" height="90" class="cell"/>
  <rect x="340" y="170" width="120" height="90" class="cell"/>
  <rect x="470" y="170" width="120" height="90" class="cell"/>
  <rect x="610" y="170" width="120" height="90" class="nofit"/>
  <text x="140" y="225" class="body" text-anchor="middle">3</text>
  <text x="270" y="225" class="body" text-anchor="middle">1</text>
  <text x="400" y="225" class="body" text-anchor="middle">4</text>
  <text x="530" y="225" class="body" text-anchor="middle">1</text>
  <text x="670" y="225" class="body" text-anchor="middle">5</text>

  <!-- copy arrows old -> new -->
  <line x1="140" y1="268" x2="140" y2="392" class="arrow" marker-end="url(#tri)"/>
  <line x1="270" y1="268" x2="270" y2="392" class="arrow" marker-end="url(#tri)"/>
  <line x1="400" y1="268" x2="400" y2="392" class="arrow" marker-end="url(#tri)"/>
  <line x1="530" y1="268" x2="530" y2="392" class="arrow" marker-end="url(#tri)"/>
  <line x1="670" y1="268" x2="662" y2="392" class="arrow2" marker-end="url(#tri2)"/>
  <text x="800" y="330" class="small">copy 4 elements into the new block &#8212; O(n)</text>
  <text x="800" y="358" class="small">then the blocked append lands in slot 4</text>

  <!-- new block -->
  <rect x="80"  y="400" width="120" height="90" class="cell"/>
  <rect x="210" y="400" width="120" height="90" class="cell"/>
  <rect x="340" y="400" width="120" height="90" class="cell"/>
  <rect x="470" y="400" width="120" height="90" class="cell"/>
  <rect x="600" y="400" width="120" height="90" class="hot"/>
  <rect x="730" y="400" width="120" height="90" class="free"/>
  <rect x="860" y="400" width="120" height="90" class="free"/>
  <rect x="990" y="400" width="120" height="90" class="free"/>
  <text x="140" y="455" class="body" text-anchor="middle">3</text>
  <text x="270" y="455" class="body" text-anchor="middle">1</text>
  <text x="400" y="455" class="body" text-anchor="middle">4</text>
  <text x="530" y="455" class="body" text-anchor="middle">1</text>
  <text x="660" y="455" class="body" text-anchor="middle">5</text>
  <text x="790" y="455" class="small" text-anchor="middle">free</text>
  <text x="920" y="455" class="small" text-anchor="middle">free</text>
  <text x="1050" y="455" class="small" text-anchor="middle">free</text>

  <text x="140" y="525" class="small" text-anchor="middle">0</text>
  <text x="270" y="525" class="small" text-anchor="middle">1</text>
  <text x="400" y="525" class="small" text-anchor="middle">2</text>
  <text x="530" y="525" class="small" text-anchor="middle">3</text>
  <text x="660" y="525" class="small" text-anchor="middle">4</text>
  <text x="790" y="525" class="small" text-anchor="middle">5</text>
  <text x="920" y="525" class="small" text-anchor="middle">6</text>
  <text x="1050" y="525" class="small" text-anchor="middle">7</text>
  <text x="80" y="565" class="body">New block &#8212; capacity 8, size 5. The old block is freed after the copy.</text>

  <text x="60" y="612" class="muted">Geometric growth (CPython &#8776;1.125&#215;, textbooks 2&#215;) keeps copies rare &#8594; amortized O(1) append.</text>
</svg>
