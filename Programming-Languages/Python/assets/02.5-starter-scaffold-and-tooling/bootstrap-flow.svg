<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">Day-one project bootstrap flow</title>
  <desc id="desc">Five steps from empty folder to runnable installed package with tests green.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #4b5563; }
      .heading { font-size: 16px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        fill: #be185d;
      }
      .white { fill: #ffffff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1180" height="420" fill="#ffffff"/>
  <text x="590" y="40" class="title" text-anchor="middle">Day-one bootstrap</text>
  <text x="590" y="68" class="subtitle" text-anchor="middle">Same sequence on a laptop and in CI: scaffold → env → editable install → prove import → test / run</text>

  <!-- Step boxes -->
  <rect x="40" y="110" width="200" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="70" cy="145" r="18" fill="#f59e0b"/>
  <text x="70" y="151" class="heading white" text-anchor="middle">1</text>
  <text x="140" y="150" class="heading" text-anchor="middle">Scaffold</text>
  <text x="140" y="190" class="body" text-anchor="middle">Copy tree +</text>
  <text x="140" y="212" class="body" text-anchor="middle">pyproject.toml</text>
  <text x="140" y="250" class="mono" text-anchor="middle">src/ · tests/</text>
  <text x="140" y="280" class="body" text-anchor="middle">rename package</text>

  <line x1="250" y1="210" x2="280" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="290" y="110" width="200" height="200" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <circle cx="320" cy="145" r="18" fill="#0284c7"/>
  <text x="320" y="151" class="heading white" text-anchor="middle">2</text>
  <text x="390" y="150" class="heading" text-anchor="middle">Env</text>
  <text x="390" y="190" class="body" text-anchor="middle">Create venv</text>
  <text x="390" y="212" class="body" text-anchor="middle">activate it</text>
  <text x="390" y="250" class="mono" text-anchor="middle">uv venv</text>
  <text x="390" y="280" class="mono" text-anchor="middle">source .venv/...</text>

  <line x1="500" y1="210" x2="530" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="540" y="110" width="200" height="200" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="570" cy="145" r="18" fill="#22c55e"/>
  <text x="570" y="151" class="heading white" text-anchor="middle">3</text>
  <text x="640" y="150" class="heading" text-anchor="middle">Install</text>
  <text x="640" y="190" class="body" text-anchor="middle">Editable + dev</text>
  <text x="640" y="212" class="body" text-anchor="middle">extras</text>
  <text x="640" y="250" class="mono" text-anchor="middle">uv pip install</text>
  <text x="640" y="280" class="mono" text-anchor="middle">-e ".[dev]"</text>

  <line x1="750" y1="210" x2="780" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="790" y="110" width="160" height="200" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <circle cx="820" cy="145" r="18" fill="#9333ea"/>
  <text x="820" y="151" class="heading white" text-anchor="middle">4</text>
  <text x="870" y="150" class="heading" text-anchor="middle">Prove</text>
  <text x="870" y="200" class="body" text-anchor="middle">Import works</text>
  <text x="870" y="230" class="mono" text-anchor="middle">import pkg</text>
  <text x="870" y="270" class="body" text-anchor="middle">print __file__</text>

  <line x1="960" y1="210" x2="990" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="1000" y="110" width="150" height="200" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <circle cx="1030" cy="145" r="18" fill="#db2777"/>
  <text x="1030" y="151" class="heading white" text-anchor="middle">5</text>
  <text x="1075" y="150" class="heading" text-anchor="middle">Run</text>
  <text x="1075" y="200" class="body" text-anchor="middle">pytest</text>
  <text x="1075" y="230" class="mono" text-anchor="middle">python -m</text>
  <text x="1075" y="270" class="mono" text-anchor="middle">ruff check</text>

  <text x="590" y="360" class="subtitle" text-anchor="middle">If step 4 fails under src layout, fix install — do not paper over with PYTHONPATH.</text>
  <text x="590" y="390" class="subtitle" text-anchor="middle">CI should run steps 2–5 with the same commands the README documents.</text>
</svg>
