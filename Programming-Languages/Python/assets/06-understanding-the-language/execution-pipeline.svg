<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">CPython execution pipeline</title>
  <desc id="desc">Source to tokens to AST to bytecode to evaluation loop; native machine code is the C interpreter itself.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .subtitle { font-size: 13px; fill: #4b5563; }
      .heading { font-size: 14px; font-weight: 700; }
      .body { font-size: 12px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 11px; fill: #be185d; }
      .white { fill: #ffffff; }
    </style>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="520" fill="#ffffff"/>
  <text x="590" y="34" class="title" text-anchor="middle">What happens when you run python app.py (CPython)</text>
  <text x="590" y="58" class="subtitle" text-anchor="middle">Not “line-by-line pure interpreter.” Compile to bytecode, then a C loop executes opcodes.</text>

  <rect x="30" y="90" width="160" height="140" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="110" y="130" class="heading" text-anchor="middle">.py source</text>
  <text x="110" y="165" class="mono" text-anchor="middle">UTF-8 text</text>
  <text x="110" y="195" class="body" text-anchor="middle">your code</text>

  <line x1="200" y1="160" x2="230" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ap)"/>

  <rect x="240" y="90" width="160" height="140" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="320" y="125" class="heading" text-anchor="middle">Parse</text>
  <text x="320" y="155" class="body" text-anchor="middle">tokens → AST</text>
  <text x="320" y="185" class="body" text-anchor="middle">syntax tree</text>
  <text x="320" y="210" class="mono" text-anchor="middle">ast module</text>

  <line x1="410" y1="160" x2="440" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ap)"/>

  <rect x="450" y="90" width="170" height="140" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="535" y="125" class="heading" text-anchor="middle">Compile</text>
  <text x="535" y="155" class="body" text-anchor="middle">bytecode</text>
  <text x="535" y="180" class="mono" text-anchor="middle">code object</text>
  <text x="535" y="210" class="mono" text-anchor="middle">.pyc cache</text>

  <line x1="630" y1="160" x2="660" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ap)"/>

  <rect x="670" y="90" width="200" height="140" rx="10" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="770" y="125" class="heading" text-anchor="middle">Eval loop</text>
  <text x="770" y="155" class="body" text-anchor="middle">ceval / PVM</text>
  <text x="770" y="180" class="body" text-anchor="middle">stack machine</text>
  <text x="770" y="210" class="mono" text-anchor="middle">opcode switch</text>

  <line x1="880" y1="160" x2="910" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#ap)"/>

  <rect x="920" y="90" width="220" height="140" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="1030" y="125" class="heading" text-anchor="middle">Effects</text>
  <text x="1030" y="155" class="body" text-anchor="middle">objects, I/O,</text>
  <text x="1030" y="180" class="body" text-anchor="middle">calls into C</text>
  <text x="1030" y="210" class="body" text-anchor="middle">extensions…</text>

  <rect x="30" y="280" width="1120" height="200" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="590" y="320" class="heading" text-anchor="middle">Where is “machine code”?</text>
  <text x="60" y="360" class="body">• Your .py does NOT become a native .exe by default.</text>
  <text x="60" y="390" class="body">• The CPython program itself is already machine code (compiled C). It interprets bytecode.</text>
  <text x="60" y="420" class="body">• Hot paths may use adaptive specializing interpreter (3.11+) — still not a full user-level AOT compile.</text>
  <text x="60" y="450" class="body">• PyPy can JIT to machine code; Cython/Numba/etc. are separate tools that generate native code.</text>
</svg>
