<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 400" role="img" aria-labelledby="title desc">
  <title id="title">Shared mutable list</title>
  <desc id="desc">Two names pointing to one list; mutating through one is visible through the other.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .heading { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #be185d; }
    </style>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="400" fill="#ffffff"/>
  <text x="590" y="36" class="title" text-anchor="middle">a = [1, 2]; b = a; b.append(3)</text>

  <rect x="80" y="80" width="160" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="160" y="118" class="mono" text-anchor="middle">name a</text>
  <rect x="80" y="180" width="160" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="160" y="218" class="mono" text-anchor="middle">name b</text>

  <line x1="240" y1="110" x2="360" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="240" y1="210" x2="360" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="370" y="100" width="420" height="160" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="580" y="140" class="heading" text-anchor="middle">ONE list object</text>
  <text x="580" y="180" class="mono" text-anchor="middle">[ 1 , 2 , 3 ]</text>
  <text x="580" y="220" class="body" text-anchor="middle">a and b both see the append</text>

  <rect x="840" y="100" width="280" height="160" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="980" y="140" class="heading" text-anchor="middle" style="fill:#166534">Copy if needed</text>
  <text x="860" y="180" class="mono">b = a.copy()</text>
  <text x="860" y="210" class="mono">b = list(a)</text>
  <text x="860" y="240" class="mono">b = a[:]</text>
</svg>
