<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" role="img" aria-labelledby="title desc">
  <title id="title">Names point to objects</title>
  <desc id="desc">Variables are names in a namespace that reference heap objects with type and value.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 16px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #be185d; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="480" fill="#ffffff"/>
  <text x="590" y="36" class="title" text-anchor="middle">x = 42 — names vs objects (memory view)</text>
  <text x="590" y="62" class="subtitle" text-anchor="middle">A name holds a reference. The object holds type + value (+ refcount in CPython).</text>

  <rect x="60" y="120" width="280" height="280" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="200" y="155" class="heading" text-anchor="middle" style="fill:#075985">Namespace</text>
  <text x="200" y="185" class="body" text-anchor="middle">(locals / globals)</text>
  <rect x="90" y="210" width="220" height="50" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="200" y="242" class="mono" text-anchor="middle">x  →  ref</text>
  <rect x="90" y="280" width="220" height="50" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="200" y="312" class="mono" text-anchor="middle">y  →  ref</text>
  <text x="200" y="370" class="body" text-anchor="middle">Names have no type.</text>

  <line x1="340" y1="235" x2="420" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="340" y1="305" x2="420" y2="305" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="430" y="120" width="320" height="140" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="155" class="heading" text-anchor="middle" style="fill:#166534">int object</text>
  <text x="450" y="190" class="mono">type: int</text>
  <text x="450" y="220" class="mono">value: 42</text>
  <text x="450" y="250" class="mono">id / refcount: ...</text>

  <rect x="430" y="280" width="320" height="120" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="315" class="heading" text-anchor="middle" style="fill:#92400e">After y = x</text>
  <text x="450" y="350" class="body">Both names → same object</text>
  <text x="450" y="380" class="mono">x is y  →  True</text>

  <rect x="790" y="120" width="340" height="280" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="960" y="155" class="heading" text-anchor="middle">Remember</text>
  <text x="820" y="200" class="body">• Assignment rebinds names</text>
  <text x="820" y="235" class="body">• Objects live on the heap</text>
  <text x="820" y="270" class="body">• Type lives on the object</text>
  <text x="820" y="305" class="body">• == compares values</text>
  <text x="820" y="340" class="body">• is compares identity</text>
  <text x="820" y="375" class="body">• Mutable objects can change</text>
</svg>
