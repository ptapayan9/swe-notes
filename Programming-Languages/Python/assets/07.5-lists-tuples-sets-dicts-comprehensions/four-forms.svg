<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">Four comprehension forms</title>
  <desc id="desc">List, set, dict comprehensions and generator expressions — what each delimiter builds.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 14px; font-weight: 700; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; fill: #be185d; }
      .body { font-size: 12px; fill: #374151; }
    </style>
  </defs>
  <rect width="1180" height="360" fill="#ffffff"/>
  <text x="590" y="34" class="title" text-anchor="middle">Four forms — delimiters decide the result</text>
  <text x="590" y="58" class="subtitle" text-anchor="middle">Same for/if skeleton; brackets vs braces vs parens change what you get.</text>

  <rect x="30" y="90" width="270" height="230" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="125" class="heading" text-anchor="middle" style="fill:#075985">list</text>
  <text x="165" y="165" class="mono" text-anchor="middle">[expr for …]</text>
  <text x="50" y="210" class="body">Ordered, allows dups.</text>
  <text x="50" y="235" class="body">Eager — full list now.</text>
  <text x="50" y="270" class="mono">[x*x for x in xs]</text>

  <rect x="315" y="90" width="270" height="230" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="125" class="heading" text-anchor="middle" style="fill:#92400e">set</text>
  <text x="450" y="165" class="mono" text-anchor="middle">{expr for …}</text>
  <text x="335" y="210" class="body">Unique hashable values.</text>
  <text x="335" y="235" class="body">Eager — full set now.</text>
  <text x="335" y="270" class="mono">{x%3 for x in xs}</text>

  <rect x="600" y="90" width="270" height="230" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="735" y="125" class="heading" text-anchor="middle" style="fill:#9d174d">dict</text>
  <text x="735" y="165" class="mono" text-anchor="middle">{k: v for …}</text>
  <text x="620" y="210" class="body">Needs key: value.</text>
  <text x="620" y="235" class="body">Eager — full dict now.</text>
  <text x="620" y="270" class="mono">{c: ord(c) for c in s}</text>

  <rect x="885" y="90" width="270" height="230" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="1020" y="125" class="heading" text-anchor="middle" style="fill:#166534">generator</text>
  <text x="1020" y="165" class="mono" text-anchor="middle">(expr for …)</text>
  <text x="905" y="210" class="body">Lazy iterator object.</text>
  <text x="905" y="235" class="body">No full list unless you</text>
  <text x="905" y="255" class="body">consume it (list, sum…).</text>
  <text x="905" y="295" class="mono">(x*x for x in xs)</text>
</svg>
