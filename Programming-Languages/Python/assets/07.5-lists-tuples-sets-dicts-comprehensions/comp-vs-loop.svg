<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">Comprehension vs loop</title>
  <desc id="desc">Same map/filter work as a for-loop with append, or as a list comprehension that builds the result in one expression.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; fill: #be185d; }
      .label { font-size: 12px; fill: #64748b; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="420" fill="#ffffff"/>
  <text x="590" y="34" class="title" text-anchor="middle">Same job, two shapes</text>
  <text x="590" y="58" class="subtitle" text-anchor="middle">Filter + map over nums → squares of positives. Left is a loop; right is a list comprehension.</text>

  <!-- Loop panel -->
  <rect x="40" y="85" width="530" height="300" rx="14" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="305" y="118" class="heading" text-anchor="middle" style="fill:#075985">for-loop + append</text>
  <text x="70" y="155" class="mono">out = []</text>
  <text x="70" y="185" class="mono">for x in nums:</text>
  <text x="90" y="215" class="mono">if x &gt; 0:</text>
  <text x="110" y="245" class="mono">out.append(x * x)</text>
  <text x="70" y="295" class="label">Steps are explicit: empty list → walk → maybe append.</text>
  <text x="70" y="325" class="label">Easy to add logging, break, multiple statements.</text>
  <text x="70" y="355" class="body">Result: full list in memory when the loop ends.</text>

  <!-- Comp panel -->
  <rect x="610" y="85" width="530" height="300" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="875" y="118" class="heading" text-anchor="middle" style="fill:#166534">list comprehension</text>
  <text x="640" y="170" class="mono">out = [x * x for x in nums if x &gt; 0]</text>

  <rect x="660" y="210" width="100" height="50" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="710" y="240" class="mono" text-anchor="middle">x * x</text>
  <text x="710" y="278" class="label" text-anchor="middle">map expr</text>

  <rect x="790" y="210" width="140" height="50" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="860" y="240" class="mono" text-anchor="middle">for x in …</text>
  <text x="860" y="278" class="label" text-anchor="middle">source</text>

  <rect x="960" y="210" width="120" height="50" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="1020" y="240" class="mono" text-anchor="middle">if x &gt; 0</text>
  <text x="1020" y="278" class="label" text-anchor="middle">filter</text>

  <text x="640" y="330" class="label">One expression: build, filter, transform.</text>
  <text x="640" y="355" class="body">Still allocates the full list when it runs.</text>
</svg>
