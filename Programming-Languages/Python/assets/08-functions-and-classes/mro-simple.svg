<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">Simple inheritance lookup</title>
  <desc id="desc">Attribute lookup walks the method resolution order: subclass then bases then object.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; fill: #be185d; }
      .small { font-size: 12px; fill: #4b5563; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="360" fill="#ffffff"/>
  <text x="590" y="36" class="title" text-anchor="middle">puppy.speak() — look up along the chain</text>
  <text x="590" y="62" class="subtitle" text-anchor="middle">MRO (method resolution order) for single inheritance is simply subclass → parent → object.</text>

  <rect x="80" y="120" width="220" height="100" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="190" y="160" class="heading" text-anchor="middle" style="fill:#075985">instance</text>
  <text x="190" y="195" class="mono" text-anchor="middle">puppy</text>

  <line x1="300" y1="170" x2="370" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="335" y="150" class="small" text-anchor="middle">1</text>

  <rect x="380" y="120" width="220" height="100" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="490" y="160" class="heading" text-anchor="middle" style="fill:#166534">class Puppy</text>
  <text x="490" y="195" class="mono" text-anchor="middle">speak? maybe</text>

  <line x1="600" y1="170" x2="670" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="635" y="150" class="small" text-anchor="middle">2</text>

  <rect x="680" y="120" width="220" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="790" y="160" class="heading" text-anchor="middle" style="fill:#92400e">class Dog</text>
  <text x="790" y="195" class="mono" text-anchor="middle">speak found!</text>

  <line x1="900" y1="170" x2="970" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="935" y="150" class="small" text-anchor="middle">3</text>

  <rect x="980" y="120" width="160" height="100" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="1060" y="160" class="heading" text-anchor="middle">object</text>
  <text x="1060" y="195" class="small" text-anchor="middle">base of all</text>

  <text x="80" y="280" class="body">super() continues the search from the next class in the MRO (not “always the parent class” in multiple inheritance).</text>
  <text x="80" y="320" class="mono">Puppy.__mro__  →  (Puppy, Dog, object)</text>
</svg>
