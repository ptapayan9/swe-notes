<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">How Python finds a module</title>
  <desc id="desc">Step-by-step search order when you import a name: sys.modules cache, then sys.path entries, then finders/loaders.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #4b5563; }
      .heading { font-size: 18px; font-weight: 700; }
      .body { font-size: 15px; }
      .small { font-size: 13px; fill: #4b5563; }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 14px;
      }
      .white { fill: #ffffff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1180" height="680" fill="#ffffff"/>
  <text x="590" y="42" class="title" text-anchor="middle">import myapp.core.service — search order</text>
  <text x="590" y="70" class="subtitle" text-anchor="middle">Python does not "look around the file." It walks a fixed path list until something loads.</text>

  <!-- Step 1 -->
  <rect x="80" y="110" width="1020" height="88" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <circle cx="130" cy="154" r="24" fill="#0284c7"/>
  <text x="130" y="160" class="heading white" text-anchor="middle">1</text>
  <text x="180" y="140" class="heading">sys.modules cache</text>
  <text x="180" y="168" class="body">If the name was already imported in this process, reuse it. Second import is nearly free.</text>
  <text x="180" y="188" class="small mono">import sys; print("myapp" in sys.modules)</text>

  <line x1="590" y1="198" x2="590" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="80" y="236" width="1020" height="88" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <circle cx="130" cy="280" r="24" fill="#9333ea"/>
  <text x="130" y="286" class="heading white" text-anchor="middle">2</text>
  <text x="180" y="266" class="heading">sys.path — ordered list of directories / zip files</text>
  <text x="180" y="294" class="body">Python tries each entry left-to-right. First match wins. Order matters.</text>
  <text x="180" y="314" class="small mono">python -c "import sys; print('\n'.join(sys.path))"</text>

  <line x1="590" y1="324" x2="590" y2="356" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: sys.path breakdown -->
  <rect x="80" y="362" width="1020" height="200" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="590" y="396" class="heading" text-anchor="middle">What fills sys.path (typical order)</text>

  <rect x="110" y="420" width="220" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="452" class="heading" text-anchor="middle">'' (cwd)</text>
  <text x="220" y="480" class="small" text-anchor="middle">script's directory, or</text>
  <text x="220" y="500" class="small" text-anchor="middle">cwd for -m / REPL</text>

  <rect x="360" y="420" width="220" height="110" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="470" y="452" class="heading" text-anchor="middle">PYTHONPATH</text>
  <text x="470" y="480" class="small" text-anchor="middle">extra dirs you inject</text>
  <text x="470" y="500" class="small" text-anchor="middle">prefer install over this</text>

  <rect x="610" y="420" width="220" height="110" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="452" class="heading" text-anchor="middle">site-packages</text>
  <text x="720" y="480" class="small" text-anchor="middle">venv / installed pkgs</text>
  <text x="720" y="500" class="small" text-anchor="middle">editable installs land here</text>

  <rect x="860" y="420" width="210" height="110" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="965" y="452" class="heading" text-anchor="middle">stdlib</text>
  <text x="965" y="480" class="small" text-anchor="middle">built-in modules</text>
  <text x="965" y="500" class="small" text-anchor="middle">json, os, pathlib...</text>

  <line x1="590" y1="562" x2="590" y2="594" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="80" y="600" width="1020" height="56" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <circle cx="130" cy="628" r="20" fill="#db2777"/>
  <text x="130" y="634" class="heading white" text-anchor="middle">3</text>
  <text x="180" y="622" class="heading">Find package or module file under that path</text>
  <text x="180" y="642" class="body">myapp/ as package · myapp.py as module · namespace package if no __init__.py (PEP 420)</text>
</svg>
