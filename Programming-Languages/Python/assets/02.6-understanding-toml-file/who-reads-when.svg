<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" role="img" aria-labelledby="title desc">
  <title id="title">When pyproject.toml is applied</title>
  <desc id="desc">Timeline: create venv ignores toml; install applies project table; running tools reads tool tables.</desc>
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        fill: #111827;
      }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 16px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono {
        font-family: "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px;
        fill: #be185d;
      }
      .white { fill: #ffffff; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1180" height="480" fill="#ffffff"/>
  <text x="590" y="38" class="title" text-anchor="middle">The file sits idle until something reads it</text>
  <text x="590" y="64" class="subtitle" text-anchor="middle">venv create ≠ install. Tool config ≠ packaging metadata.</text>

  <rect x="50" y="100" width="240" height="220" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="80" cy="135" r="18" fill="#64748b"/>
  <text x="80" y="141" class="heading white" text-anchor="middle">1</text>
  <text x="170" y="140" class="heading" text-anchor="middle">Create env</text>
  <text x="170" y="185" class="mono" text-anchor="middle">uv venv</text>
  <text x="170" y="220" class="body" text-anchor="middle">Does not apply</text>
  <text x="170" y="245" class="body" text-anchor="middle">pyproject.toml</text>
  <text x="170" y="285" class="body" text-anchor="middle">Empty site-packages</text>

  <line x1="300" y1="210" x2="340" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="350" y="100" width="240" height="220" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="380" cy="135" r="18" fill="#22c55e"/>
  <text x="380" y="141" class="heading white" text-anchor="middle">2</text>
  <text x="470" y="140" class="heading" text-anchor="middle">Install</text>
  <text x="470" y="185" class="mono" text-anchor="middle">pip install -e .</text>
  <text x="470" y="220" class="body" text-anchor="middle">Reads build-system</text>
  <text x="470" y="245" class="body" text-anchor="middle">+ project tables</text>
  <text x="470" y="285" class="body" text-anchor="middle">Deps + package land</text>

  <line x1="600" y1="210" x2="640" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="650" y="100" width="230" height="220" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <circle cx="680" cy="135" r="18" fill="#0284c7"/>
  <text x="680" y="141" class="heading white" text-anchor="middle">3</text>
  <text x="765" y="140" class="heading" text-anchor="middle">Import / run</text>
  <text x="765" y="185" class="mono" text-anchor="middle">import myapp</text>
  <text x="765" y="220" class="mono" text-anchor="middle">myapp serve</text>
  <text x="765" y="255" class="body" text-anchor="middle">Uses what install</text>
  <text x="765" y="280" class="body" text-anchor="middle">put in the env</text>

  <line x1="890" y1="210" x2="930" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="940" y="100" width="200" height="220" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="970" cy="135" r="18" fill="#f59e0b"/>
  <text x="970" y="141" class="heading white" text-anchor="middle">4</text>
  <text x="1040" y="140" class="heading" text-anchor="middle">Quality tools</text>
  <text x="1040" y="185" class="mono" text-anchor="middle">pytest</text>
  <text x="1040" y="210" class="mono" text-anchor="middle">ruff · mypy</text>
  <text x="1040" y="250" class="body" text-anchor="middle">Read [tool.*]</text>
  <text x="1040" y="280" class="body" text-anchor="middle">when invoked</text>

  <rect x="50" y="360" width="1090" height="80" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="590" y="395" class="body" text-anchor="middle">Distribution name (PyPI / pip): project.name  ·  Import name: folder under src/  ·  CLI name: project.scripts key</text>
  <text x="590" y="420" class="small" text-anchor="middle" style="font-size:13px;fill:#4b5563">These three names can differ. Configure each deliberately.</text>
</svg>
