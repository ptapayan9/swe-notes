<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">List holds references</title>
  <desc id="desc">A list object has a contiguous buffer of pointers to element objects on the heap.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #be185d; }
      .idx { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; fill: #64748b; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="420" fill="#ffffff"/>
  <text x="590" y="36" class="title" text-anchor="middle">nums = [10, 20, 30] — list of references</text>
  <text x="590" y="62" class="subtitle" text-anchor="middle">The list does not “contain” the ints inline. It holds pointers to int objects.</text>

  <rect x="60" y="110" width="420" height="260" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="270" y="145" class="heading" text-anchor="middle" style="fill:#075985">list object</text>
  <text x="90" y="180" class="mono">type: list</text>
  <text x="90" y="208" class="mono">len: 3</text>
  <text x="90" y="236" class="body">buffer of refs (resizable):</text>

  <rect x="90" y="260" width="70" height="50" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="125" y="282" class="idx" text-anchor="middle">[0]</text>
  <text x="125" y="300" class="mono" text-anchor="middle" style="font-size:11px">→</text>

  <rect x="180" y="260" width="70" height="50" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="215" y="282" class="idx" text-anchor="middle">[1]</text>
  <text x="215" y="300" class="mono" text-anchor="middle" style="font-size:11px">→</text>

  <rect x="270" y="260" width="70" height="50" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="305" y="282" class="idx" text-anchor="middle">[2]</text>
  <text x="305" y="300" class="mono" text-anchor="middle" style="font-size:11px">→</text>

  <text x="370" y="290" class="body">…</text>

  <line x1="480" y1="285" x2="540" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="285" x2="540" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="285" x2="540" y2="340" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="550" y="120" width="200" height="70" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="150" class="heading" text-anchor="middle" style="fill:#166534">int</text>
  <text x="650" y="175" class="mono" text-anchor="middle">value: 10</text>

  <rect x="550" y="210" width="200" height="70" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="240" class="heading" text-anchor="middle" style="fill:#166534">int</text>
  <text x="650" y="265" class="mono" text-anchor="middle">value: 20</text>

  <rect x="550" y="300" width="200" height="70" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="330" class="heading" text-anchor="middle" style="fill:#166534">int</text>
  <text x="650" y="355" class="mono" text-anchor="middle">value: 30</text>

  <rect x="800" y="120" width="340" height="250" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="970" y="155" class="heading" text-anchor="middle">Why this matters</text>
  <text x="830" y="200" class="body">• nums[i] is O(1) pointer fetch</text>
  <text x="830" y="235" class="body">• mixed types allowed: [1, "a"]</text>
  <text x="830" y="270" class="body">• a = b shares the list object</text>
  <text x="830" y="305" class="body">• slice / copy: new list, same elems</text>
  <text x="830" y="340" class="body">• insert at front shifts many refs</text>
</svg>
