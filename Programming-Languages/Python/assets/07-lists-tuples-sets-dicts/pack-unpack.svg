<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" role="img" aria-labelledby="title desc">
  <title id="title">Packing and unpacking</title>
  <desc id="desc">Left: packing multiple values into a tuple. Right: unpacking a sequence into names, including star rest.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .subtitle { font-size: 14px; fill: #4b5563; }
      .heading { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #be185d; }
      .label { font-size: 12px; fill: #64748b; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="480" fill="#ffffff"/>
  <text x="590" y="36" class="title" text-anchor="middle">Pack vs unpack</text>
  <text x="590" y="62" class="subtitle" text-anchor="middle">Pack = many values → one container. Unpack = one iterable → many names (or *rest).</text>

  <!-- Pack panel -->
  <rect x="40" y="90" width="520" height="360" rx="14" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="300" y="125" class="heading" text-anchor="middle" style="fill:#075985">Pack</text>
  <text x="300" y="150" class="mono" text-anchor="middle">point = 3, 4</text>
  <text x="300" y="172" class="label" text-anchor="middle">comma builds a tuple (parens optional)</text>

  <rect x="80" y="200" width="90" height="56" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="125" y="234" class="mono" text-anchor="middle">3</text>
  <rect x="190" y="200" width="90" height="56" rx="8" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="235" y="234" class="mono" text-anchor="middle">4</text>

  <line x1="290" y1="228" x2="340" y2="228" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="350" y="190" width="170" height="90" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="435" y="220" class="heading" text-anchor="middle" style="fill:#075985">tuple</text>
  <text x="435" y="248" class="mono" text-anchor="middle">(3, 4)</text>

  <text x="80" y="320" class="body">Also packing:</text>
  <text x="80" y="348" class="mono">xs = [a, b, c]      # list pack</text>
  <text x="80" y="376" class="mono">d = {"x": x, "y": y}</text>
  <text x="80" y="404" class="mono">return lo, hi       # multi-return</text>

  <!-- Unpack panel -->
  <rect x="600" y="90" width="540" height="360" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="870" y="125" class="heading" text-anchor="middle" style="fill:#166534">Unpack</text>
  <text x="870" y="150" class="mono" text-anchor="middle">x, y = point</text>
  <text x="870" y="172" class="label" text-anchor="middle">right side: any iterable of the right length</text>

  <rect x="640" y="195" width="150" height="70" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="715" y="225" class="heading" text-anchor="middle" style="fill:#166534">tuple</text>
  <text x="715" y="248" class="mono" text-anchor="middle">(3, 4)</text>

  <line x1="800" y1="230" x2="850" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="860" y="195" width="80" height="56" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="900" y="220" class="label" text-anchor="middle">x</text>
  <text x="900" y="240" class="mono" text-anchor="middle">3</text>
  <rect x="960" y="195" width="80" height="56" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="1000" y="220" class="label" text-anchor="middle">y</text>
  <text x="1000" y="240" class="mono" text-anchor="middle">4</text>

  <text x="640" y="300" class="body">Star rest (one * on left):</text>
  <text x="640" y="328" class="mono">first, *mid, last = [1,2,3,4]</text>
  <text x="640" y="356" class="mono"># first=1, mid=[2,3], last=4</text>
  <text x="640" y="392" class="body">Dict merge / call site:</text>
  <text x="640" y="420" class="mono">{**a, **b}   f(*args, **kw)</text>
</svg>
