<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 380" role="img" aria-labelledby="title desc">
  <title id="title">for loop iterator in memory</title>
  <desc id="desc">for x in items creates an iterator that yields references one by one into name x.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 26px; font-weight: 700; }
      .heading { font-size: 15px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #be185d; }
    </style>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1180" height="380" fill="#ffffff"/>
  <text x="590" y="36" class="title" text-anchor="middle">for x in items: — objects involved</text>

  <rect x="50" y="90" width="240" height="220" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="170" y="130" class="heading" text-anchor="middle">iterable</text>
  <text x="170" y="170" class="mono" text-anchor="middle">items</text>
  <text x="170" y="210" class="body" text-anchor="middle">list / range /</text>
  <text x="170" y="235" class="body" text-anchor="middle">generator…</text>
  <text x="170" y="275" class="body" text-anchor="middle">supports iter()</text>

  <line x1="300" y1="200" x2="350" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="360" y="90" width="240" height="220" rx="12" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="480" y="130" class="heading" text-anchor="middle">iterator</text>
  <text x="480" y="170" class="mono" text-anchor="middle">iter(items)</text>
  <text x="480" y="210" class="body" text-anchor="middle">remembers position</text>
  <text x="480" y="245" class="body" text-anchor="middle">next() each step</text>
  <text x="480" y="285" class="body" text-anchor="middle">StopIteration ends</text>

  <line x1="610" y1="200" x2="660" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="670" y="90" width="220" height="220" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="130" class="heading" text-anchor="middle">name x</text>
  <text x="780" y="180" class="body" text-anchor="middle">rebinds each</text>
  <text x="780" y="210" class="body" text-anchor="middle">iteration to the</text>
  <text x="780" y="240" class="body" text-anchor="middle">yielded object</text>
  <text x="780" y="280" class="mono" text-anchor="middle">x → element</text>

  <rect x="920" y="90" width="220" height="220" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="1030" y="130" class="heading" text-anchor="middle">body</text>
  <text x="1030" y="180" class="body" text-anchor="middle">runs with that</text>
  <text x="1030" y="210" class="body" text-anchor="middle">binding; no copy</text>
  <text x="1030" y="240" class="body" text-anchor="middle">unless you make</text>
  <text x="1030" y="270" class="body" text-anchor="middle">one</text>
</svg>
