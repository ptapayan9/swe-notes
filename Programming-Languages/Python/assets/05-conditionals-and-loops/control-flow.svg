<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">Control flow shapes</title>
  <desc id="desc">Branching vs looping as paths through bytecode and source.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .title { font-size: 28px; font-weight: 700; }
      .heading { font-size: 16px; font-weight: 700; }
      .body { font-size: 13px; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; fill: #be185d; }
    </style>
  </defs>
  <rect width="1180" height="420" fill="#ffffff"/>
  <text x="590" y="40" class="title" text-anchor="middle">Control flow = which instruction runs next</text>

  <rect x="50" y="90" width="340" height="280" rx="12" fill="#eff6ff" stroke="#0284c7" stroke-width="2"/>
  <text x="220" y="130" class="heading" text-anchor="middle" style="fill:#075985">if / elif / else</text>
  <text x="70" y="175" class="body">One path chosen</text>
  <text x="70" y="210" class="mono">test → jump true/false</text>
  <text x="70" y="250" class="body">Other branches skipped</text>
  <text x="70" y="290" class="body">No leftover “case” state</text>
  <text x="70" y="330" class="body">in memory after choice</text>

  <rect x="420" y="90" width="340" height="280" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="130" class="heading" text-anchor="middle" style="fill:#166534">for / while</text>
  <text x="440" y="175" class="body">Repeat a block</text>
  <text x="440" y="210" class="mono">for: iterator protocol</text>
  <text x="440" y="245" class="mono">while: re-test each time</text>
  <text x="440" y="290" class="body">Loop var rebinds each trip</text>
  <text x="440" y="330" class="body">Iterator holds progress</text>

  <rect x="790" y="90" width="340" height="280" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="960" y="130" class="heading" text-anchor="middle" style="fill:#92400e">break / continue</text>
  <text x="810" y="175" class="body">break → leave loop</text>
  <text x="810" y="215" class="body">continue → next iteration</text>
  <text x="810" y="255" class="body">Implemented as jumps</text>
  <text x="810" y="295" class="body">in bytecode (not magic)</text>
  <text x="810" y="335" class="mono">dis.dis(fn) to see</text>
</svg>
